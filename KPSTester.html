      if (!unlockedBgs.atlas) { unlockedBgs.atlas = true; gameData.unlockedBgs.atlas = true; }
      if (!unlockedBgs.criticalerror) { unlockedBgs.criticalerror = true; gameData.unlockedBgs.criticalerror = true; }
      if (!unlockedBgs.cyberspace) { unlockedBgs.cyberspace = true; gameData.unlockedBgs.cyberspace = true; }
      if (!unlockedBgs.dreamspace) { unlockedBgs.dreamspace = true; gameData.unlockedBgs.dreamspace = true; }
      renderBgSelector();
    }
  } else if (!active && eqActive) {
    eqActive = false;
    document.body.classList.remove('equinox-active');
    eqCanvas.classList.remove('active');
    if (eqAnimId) {
      cancelAnimationFrame(eqAnimId);
      eqAnimId = null;
    }
  }
}

// ═══ LUMINOSITY — THE ABSOLUTE RADIANCE ═══
var lumCanvas = document.getElementById('luminosityCanvas');
var lumCtx = lumCanvas.getContext('2d');
var lumActive = false;
var lumAnimId = null;
var lumIntroShown = false;
var lumMagicCircles = [];
var lumOrbs = [];

function resizeLumCanvas() {
  lumCanvas.width = window.innerWidth;
  lumCanvas.height = window.innerHeight;
  if (lumActive) initLumElements();
}
window.addEventListener('resize', resizeLumCanvas);
resizeLumCanvas();

var lumRays = [];
var lumMotes = [];
var lumRingPulses = [];

function initLumElements() {
  var w = lumCanvas.width;
  var h = lumCanvas.height;
  var cx = w / 2;
  var cy = h / 2;
  var minDim = Math.min(w, h);

  // 3 central magic circles with different sizes
  lumMagicCircles = [
    { x: cx, y: cy, r: minDim * 0.22, speed: 0.008, angle: 0, rings: 3, glyphCount: 24 },
    { x: cx, y: cy, r: minDim * 0.14, speed: -0.014, angle: Math.PI * 0.3, rings: 2, glyphCount: 16 },
    { x: cx, y: cy, r: minDim * 0.07, speed: 0.022, angle: Math.PI * 0.7, rings: 1, glyphCount: 10 }
  ];

  // Background floating magic circles (smaller, scattered)
  var bgCircleCount = Math.floor(Math.max(w, h) / 120);
  for (var i = 0; i < bgCircleCount; i++) {
    lumMagicCircles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 20 + Math.random() * 60,
      speed: (Math.random() > 0.5 ? 1 : -1) * (0.005 + Math.random() * 0.015),
      angle: Math.random() * Math.PI * 2,
      rings: 1,
      glyphCount: 8,
      drift: true,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      alpha: 0.15 + Math.random() * 0.25
    });
  }

  // Bouncing white/golden orbs
  lumOrbs = [];
  var orbCount = Math.floor((w * h) / 7000);
  for (var j = 0; j < orbCount; j++) {
    var or = 2 + Math.random() * 6;
    lumOrbs.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: or,
      dx: (Math.random() - 0.5) * 2.5,
      dy: (Math.random() - 0.5) * 2.5,
      alpha: 0.3 + Math.random() * 0.5,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.04,
      golden: Math.random() > 0.5
    });
  }

  // Light rays from center
  lumRays = [];
  var rayCount = 16 + Math.floor(Math.random() * 8);
  for (var r = 0; r < rayCount; r++) {
    lumRays.push({
      angle: (r / rayCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.2,
      width: 0.008 + Math.random() * 0.025,
      length: 0.5 + Math.random() * 0.5,
      alpha: 0.02 + Math.random() * 0.06,
      speed: (Math.random() - 0.5) * 0.001,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.005 + Math.random() * 0.015,
      golden: Math.random() > 0.4
    });
  }

  // Floating light motes (tiny particles rising upward)
  lumMotes = [];
  var moteCount = Math.floor((w * h) / 12000);
  for (var m = 0; m < moteCount; m++) {
    lumMotes.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: 0.5 + Math.random() * 2.5,
      vy: -0.15 - Math.random() * 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      alpha: 0.2 + Math.random() * 0.5,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.05,
      golden: Math.random() > 0.3
    });
  }

  // Expanding ring pulses
  lumRingPulses = [];
  for (var rp = 0; rp < 4; rp++) {
    lumRingPulses.push({
      progress: rp * 0.25,
      speed: 0.002 + Math.random() * 0.003,
      maxRadius: minDim * 0.6,
      lineWidth: 0.5 + Math.random() * 1
    });
  }
}

function drawMagicCircle(ctx, mc, globalAlpha) {
  var a = mc.alpha !== undefined ? mc.alpha * globalAlpha : globalAlpha;
  ctx.save();
  ctx.translate(mc.x, mc.y);
  ctx.rotate(mc.angle);
  ctx.globalAlpha = a;

  // Outer ring
  ctx.beginPath();
  ctx.arc(0, 0, mc.r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Inner rings
  for (var ring = 1; ring <= mc.rings; ring++) {
    var ringR = mc.r * (1 - ring * 0.25);
    if (ringR < 5) continue;
    ctx.beginPath();
    ctx.arc(0, 0, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.3 - ring * 0.06) + ')';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Glyphs / rune marks around the circle
  var glyphs = '\u2719\u2726\u2727\u2728\u2729\u272A\u2736\u2737\u2738\u2742\u2743\u2749\u274B\u2756\u2605\u2606\u25C6\u25C7\u25CB\u25CF\u2299\u229A\u22C6\u2312';
  var glyphsLen = glyphs.length;
  var fontSize = Math.max(8, mc.r * 0.14);
  ctx.font = fontSize + 'px serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (var g = 0; g < mc.glyphCount; g++) {
    var ga = (g / mc.glyphCount) * Math.PI * 2;
    var gx = Math.cos(ga) * (mc.r * 0.85);
    var gy = Math.sin(ga) * (mc.r * 0.85);
    ctx.fillText(glyphs[g % glyphsLen], gx, gy);
  }

  // Cross lines through center
  ctx.beginPath();
  ctx.moveTo(-mc.r * 0.5, 0);
  ctx.lineTo(mc.r * 0.5, 0);
  ctx.moveTo(0, -mc.r * 0.5);
  ctx.lineTo(0, mc.r * 0.5);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // Hexagon inscribed
  if (mc.r > 30) {
    ctx.beginPath();
    for (var h = 0; h < 6; h++) {
      var ha = (h / 6) * Math.PI * 2;
      var hx = Math.cos(ha) * mc.r * 0.6;
      var hy = Math.sin(ha) * mc.r * 0.6;
      if (h === 0) ctx.moveTo(hx, hy);
      else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawLuminosity() {
  if (!lumActive) return;
  var w = lumCanvas.width;
  var h = lumCanvas.height;
  var cx = w / 2;
  var cy = h / 2;
  var minDim = Math.min(w, h);
  var now = performance.now() / 1000;

  // Dark fade trail with warm tint
  lumCtx.fillStyle = 'rgba(5,3,0,0.07)';
  lumCtx.fillRect(0, 0, w, h);

  // Light rays from center
  lumCtx.save();
  lumCtx.translate(cx, cy);
  for (var ri = 0; ri < lumRays.length; ri++) {
    var ray = lumRays[ri];
    ray.angle += ray.speed;
    ray.pulse += ray.pulseSpeed;
    var rayAlpha = ray.alpha * (0.5 + 0.5 * Math.sin(ray.pulse));
    var rayLen = Math.max(w, h) * ray.length;
    var rayW = ray.width;

    lumCtx.save();
    lumCtx.rotate(ray.angle);
    var rayGrad = lumCtx.createLinearGradient(0, 0, rayLen, 0);
    if (ray.golden) {
      rayGrad.addColorStop(0, 'rgba(255,235,150,' + (rayAlpha * 1.5) + ')');
      rayGrad.addColorStop(0.3, 'rgba(255,210,80,' + (rayAlpha * 0.8) + ')');
      rayGrad.addColorStop(1, 'rgba(255,180,40,0)');
    } else {
      rayGrad.addColorStop(0, 'rgba(255,255,255,' + (rayAlpha * 1.5) + ')');
      rayGrad.addColorStop(0.3, 'rgba(240,240,255,' + (rayAlpha * 0.8) + ')');
      rayGrad.addColorStop(1, 'rgba(220,220,255,0)');
    }
    lumCtx.fillStyle = rayGrad;
    lumCtx.beginPath();
    lumCtx.moveTo(0, 0);
    lumCtx.lineTo(rayLen, -rayLen * rayW);
    lumCtx.lineTo(rayLen, rayLen * rayW);
    lumCtx.closePath();
    lumCtx.fill();
    lumCtx.restore();
  }
  lumCtx.restore();

  // Update & draw magic circles
  for (var i = 0; i < lumMagicCircles.length; i++) {
    var mc = lumMagicCircles[i];
    mc.angle += mc.speed;
    if (mc.drift) {
      mc.x += mc.dx;
      mc.y += mc.dy;
      if (mc.x < -mc.r) mc.x = w + mc.r;
      if (mc.x > w + mc.r) mc.x = -mc.r;
      if (mc.y < -mc.r) mc.y = h + mc.r;
      if (mc.y > h + mc.r) mc.y = -mc.r;
    }
    drawMagicCircle(lumCtx, mc, mc.drift ? 1 : 0.85);
  }

  // Expanding ring pulses from center
  for (var rp = 0; rp < lumRingPulses.length; rp++) {
    var ring = lumRingPulses[rp];
    ring.progress += ring.speed;
    if (ring.progress > 1) ring.progress -= 1;
    var ringR = ring.progress * ring.maxRadius;
    var ringAlpha = (1 - ring.progress) * 0.12;
    lumCtx.beginPath();
    lumCtx.arc(cx, cy, ringR, 0, Math.PI * 2);
    lumCtx.strokeStyle = 'rgba(255,235,180,' + ringAlpha + ')';
    lumCtx.lineWidth = ring.lineWidth * (1 - ring.progress * 0.5);
    lumCtx.stroke();
  }

  // Central radiance — layered glows (warm golden + white)
  var breathe = 0.7 + 0.3 * Math.sin(now * 0.8);
  var glowR1 = minDim * 0.18 * breathe;
  var glow1 = lumCtx.createRadialGradient(cx, cy, 0, cx, cy, glowR1);
  glow1.addColorStop(0, 'rgba(255,250,220,0.08)');
  glow1.addColorStop(0.4, 'rgba(255,230,150,0.04)');
  glow1.addColorStop(1, 'transparent');
  lumCtx.fillStyle = glow1;
  lumCtx.fillRect(0, 0, w, h);

  var glowR2 = minDim * 0.35 * breathe;
  var glow2 = lumCtx.createRadialGradient(cx, cy, 0, cx, cy, glowR2);
  glow2.addColorStop(0, 'rgba(255,255,255,0.04)');
  glow2.addColorStop(0.5, 'rgba(255,245,200,0.02)');
  glow2.addColorStop(1, 'transparent');
  lumCtx.fillStyle = glow2;
  lumCtx.fillRect(0, 0, w, h);

  // Floating motes (tiny rising particles)
  for (var mi = 0; mi < lumMotes.length; mi++) {
    var mote = lumMotes[mi];
    mote.pulse += mote.pulseSpeed;
    mote.x += mote.vx + Math.sin(now * 0.5 + mote.pulse) * 0.15;
    mote.y += mote.vy;
    if (mote.y < -10) { mote.y = h + 10; mote.x = Math.random() * w; }
    if (mote.x < -10) mote.x = w + 10;
    if (mote.x > w + 10) mote.x = -10;

    var moteAlpha = mote.alpha * (0.5 + 0.5 * Math.sin(mote.pulse));
    var ms = mote.size * (0.8 + 0.2 * Math.sin(mote.pulse * 1.5));
    lumCtx.beginPath();
    lumCtx.arc(mote.x, mote.y, ms, 0, Math.PI * 2);
    if (mote.golden) {
      lumCtx.fillStyle = 'rgba(255,230,140,' + moteAlpha + ')';
    } else {
      lumCtx.fillStyle = 'rgba(255,255,255,' + moteAlpha + ')';
    }
    lumCtx.fill();
  }

  // Update & draw orbs with golden variants
  for (var j = 0; j < lumOrbs.length; j++) {
    var orb = lumOrbs[j];
    orb.pulse += orb.pulseSpeed;
    orb.x += orb.dx;
    orb.y += orb.dy;

    if (orb.x <= orb.r) { orb.x = orb.r; orb.dx = Math.abs(orb.dx); }
    if (orb.x >= w - orb.r) { orb.x = w - orb.r; orb.dx = -Math.abs(orb.dx); }
    if (orb.y <= orb.r) { orb.y = orb.r; orb.dy = Math.abs(orb.dy); }
    if (orb.y >= h - orb.r) { orb.y = h - orb.r; orb.dy = -Math.abs(orb.dy); }

    var orbGlow = 0.5 + Math.sin(orb.pulse) * 0.5;
    var orbAlpha = orb.alpha * (0.5 + orbGlow * 0.5);
    var orbRadius = orb.r * (0.8 + orbGlow * 0.4);

    var og = lumCtx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orbRadius * 4);
    if (orb.golden) {
      og.addColorStop(0, 'rgba(255,235,150,' + (orbAlpha * 0.9) + ')');
      og.addColorStop(0.3, 'rgba(255,210,100,' + (orbAlpha * 0.35) + ')');
      og.addColorStop(1, 'rgba(200,180,100,0)');
    } else {
      og.addColorStop(0, 'rgba(255,255,255,' + (orbAlpha * 0.8) + ')');
      og.addColorStop(0.3, 'rgba(220,220,255,' + (orbAlpha * 0.3) + ')');
      og.addColorStop(1, 'rgba(200,200,255,0)');
    }
    lumCtx.beginPath();
    lumCtx.arc(orb.x, orb.y, orbRadius * 4, 0, Math.PI * 2);
    lumCtx.fillStyle = og;
    lumCtx.fill();

    lumCtx.beginPath();
    lumCtx.arc(orb.x, orb.y, orbRadius, 0, Math.PI * 2);
    lumCtx.fillStyle = orb.golden ? 'rgba(255,240,180,' + orbAlpha + ')' : 'rgba(255,255,255,' + orbAlpha + ')';
    lumCtx.fill();
  }

  lumAnimId = requestAnimationFrame(drawLuminosity);
}

function showLuminosityIntro() {
  if (lumIntroShown) return;
  lumIntroShown = true;

  var overlay = document.createElement('div');
  overlay.className = 'luminosity-intro-overlay';

  // Particle canvas for cutscene
  var pCanvas = document.createElement('canvas');
  pCanvas.className = 'lum-particle-canvas';
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  var pCtx = pCanvas.getContext('2d');
  var lumParticles = [];
  var lumPAnimId = null;

  function spawnParticle(x, y, opts) {
    var o = opts || {};
    lumParticles.push({
      x: x, y: y,
      vx: o.vx !== undefined ? o.vx : (Math.random() - 0.5) * 1.2,
      vy: o.vy !== undefined ? o.vy : (Math.random() - 0.5) * 1.2 - 0.3,
      r: o.r || (1 + Math.random() * 3),
      alpha: o.alpha || (0.3 + Math.random() * 0.7),
      decay: o.decay || (0.003 + Math.random() * 0.006),
      glow: o.glow || false,
      color: o.color || '255,255,255'
    });
  }

  function spawnAmbientBatch(count) {
    var w = pCanvas.width;
    var h = pCanvas.height;
    for (var i = 0; i < count; i++) {
      spawnParticle(
        Math.random() * w,
        Math.random() * h,
        {
          r: 1 + Math.random() * 2,
          alpha: 0.2 + Math.random() * 0.5,
          decay: 0.003 + Math.random() * 0.005,
          vy: -0.2 - Math.random() * 0.4,
          vx: (Math.random() - 0.5) * 0.5
        }
      );
    }
  }

  function spawnBurst(cx, cy, count, power) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = (0.5 + Math.random() * power);
      spawnParticle(cx + (Math.random() - 0.5) * 14, cy + (Math.random() - 0.5) * 14, {
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 1 + Math.random() * 2.5,
        alpha: 0.6 + Math.random() * 0.4,
        decay: 0.008 + Math.random() * 0.012,
        color: Math.random() > 0.5 ? '255,240,200' : '220,220,255'
      });
    }
  }

  function spawnFlashExplosion() {
    var cx = pCanvas.width / 2;
    var cy = pCanvas.height / 2;
    // Central burst
    spawnBurst(cx, cy, 40, 6);
    // Single ring burst
    var pts = 12;
    for (var i = 0; i < pts; i++) {
      var a = (i / pts) * Math.PI * 2;
      spawnParticle(cx + Math.cos(a) * 80, cy + Math.sin(a) * 80, {
        vx: Math.cos(a) * (2 + Math.random() * 3),
        vy: Math.sin(a) * (2 + Math.random() * 3),
        r: 2 + Math.random() * 2,
        alpha: 0.7 + Math.random() * 0.3,
        decay: 0.01 + Math.random() * 0.01,
        color: '255,255,240'
      });
    }
    // Light scatter
    for (var j = 0; j < 20; j++) {
      spawnParticle(
        Math.random() * pCanvas.width,
        Math.random() * pCanvas.height,
        {
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          r: 1 + Math.random() * 2,
          alpha: 0.4 + Math.random() * 0.4,
          decay: 0.01 + Math.random() * 0.015,
          color: '255,255,255'
        }
      );
    }
  }

  function drawLumParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    for (var i = lumParticles.length - 1; i >= 0; i--) {
      var p = lumParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= p.decay;
      if (p.alpha <= 0) { lumParticles.splice(i, 1); continue; }
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      pCtx.fillStyle = 'rgba(' + p.color + ',' + p.alpha + ')';
      pCtx.fill();
    }
    lumPAnimId = requestAnimationFrame(drawLumParticles);
  }

  var word1 = document.createElement('div');
  word1.className = 'luminosity-intro-word';
  word1.textContent = 'THE';
  var word2 = document.createElement('div');
  word2.className = 'luminosity-intro-word';
  word2.textContent = 'ABSOLUTE';
  var word3 = document.createElement('div');
  word3.className = 'luminosity-intro-word';
  word3.textContent = 'RADIANCE';

  overlay.appendChild(word1);
  overlay.appendChild(word2);
  overlay.appendChild(word3);
  document.body.appendChild(pCanvas);
  document.body.appendChild(overlay);

  // Start particle renderer
  lumPAnimId = requestAnimationFrame(drawLumParticles);

  // Ambient particles during fade-to-black (light spawning)
  var ambientTimer = setInterval(function() {
    spawnAmbientBatch(3);
  }, 300);

  // Phase 1: Fade to black over 3 seconds
  overlay.classList.add('fade-black');

  // Phase 2: After 3s, hold black and reveal words with bursts
  setTimeout(function() {
    overlay.classList.remove('fade-black');
    overlay.classList.add('hold-black');

    var cx = pCanvas.width / 2;
    var cy = pCanvas.height / 2;

    // Stagger word reveals with small particle bursts
    setTimeout(function() {
      word1.classList.add('reveal');
      spawnBurst(cx, cy - 70, 10, 2);
    }, 200);
    setTimeout(function() {
      word2.classList.add('reveal');
      spawnBurst(cx, cy, 14, 3);
    }, 600);
    setTimeout(function() {
      word3.classList.add('reveal');
      spawnBurst(cx, cy + 70, 18, 3);
    }, 1000);

    // Phase 3: After words are shown (2s after hold), flash white then back to black
    setTimeout(function() {
      overlay.classList.remove('hold-black');
      overlay.classList.add('flash-white');
      spawnFlashExplosion();

      // Phase 4: Fade out the overlay entirely
      setTimeout(function() {
        clearInterval(ambientTimer);
        overlay.classList.remove('flash-white');
        overlay.classList.add('fade-out');
        setTimeout(function() {
          if (lumPAnimId) cancelAnimationFrame(lumPAnimId);
          pCanvas.remove();
          overlay.remove();
        }, 1600);
      }, 600);
    }, 2500);
  }, 3000);
}

function setLuminosity(active) {
  if (active && !lumActive) {
    lumActive = true;
    document.body.classList.add('luminosity-active');
    lumCanvas.classList.add('active');
    lumCtx.clearRect(0, 0, lumCanvas.width, lumCanvas.height);
    lumCtx.fillStyle = 'rgba(0,0,0,1)';
    lumCtx.fillRect(0, 0, lumCanvas.width, lumCanvas.height);
    initLumElements();
    drawLuminosity();
    showLuminosityIntro();
    if (!unlockedBgs.luminosity) {
      unlockedBgs.luminosity = true;
      gameData.unlockedBgs.luminosity = true;
      // Unlock all lower tiers
      if (!unlockedBgs.atlas) { unlockedBgs.atlas = true; gameData.unlockedBgs.atlas = true; }
      if (!unlockedBgs.criticalerror) { unlockedBgs.criticalerror = true; gameData.unlockedBgs.criticalerror = true; }
      if (!unlockedBgs.cyberspace) { unlockedBgs.cyberspace = true; gameData.unlockedBgs.cyberspace = true; }
      if (!unlockedBgs.dreamspace) { unlockedBgs.dreamspace = true; gameData.unlockedBgs.dreamspace = true; }
      renderBgSelector();
    }
  } else if (!active && lumActive) {
    lumActive = false;
    document.body.classList.remove('luminosity-active');
    lumCanvas.classList.remove('active');
    if (lumAnimId) {
      cancelAnimationFrame(lumAnimId);
      lumAnimId = null;
    }
  }
}

// ── AQUARIUM BACKGROUND SYSTEM ──
var aqCanvas = document.getElementById('aquariumCanvas');
var aqCtx = aqCanvas.getContext('2d');
var aqActive = false;
var aqAnimId = null;
var aqFish = [];
var aqBubbles = [];
var aqPlants = [];
var aqLightRays = [];
var aqParticles = [];

function resizeAqCanvas() {
  aqCanvas.width = window.innerWidth;
  aqCanvas.height = window.innerHeight;
  if (aqActive) initAqElements();
}
window.addEventListener('resize', resizeAqCanvas);
resizeAqCanvas();

function initAqElements() {
  var w = aqCanvas.width;
  var h = aqCanvas.height;
  aqFish = [];
  aqBubbles = [];
  aqPlants = [];
  aqLightRays = [];
  aqParticles = [];

  // Koi fish — many colorful koi swimming around
  var koiCount = Math.max(8, Math.floor((w * h) / 60000));
  var koiColors = [
    { body: '#f0eef5', accent: 'rgba(255,120,60,0.8)', eye: '#0a0912', fin: 'rgba(240,230,245,0.5)' },
    { body: '#ff6b35', accent: 'rgba(255,255,255,0.7)', eye: '#1a1a2e', fin: 'rgba(255,107,53,0.4)' },
    { body: '#0a0912', accent: 'rgba(100,160,255,0.6)', eye: '#f0eef5', fin: 'rgba(20,15,30,0.5)' },
    { body: '#ffcc02', accent: 'rgba(255,80,40,0.6)', eye: '#1a1a2e', fin: 'rgba(255,204,2,0.4)' },
    { body: '#e8e8e8', accent: 'rgba(220,50,50,0.6)', eye: '#1a1a2e', fin: 'rgba(200,200,200,0.4)' },
    { body: '#c0392b', accent: 'rgba(255,255,255,0.5)', eye: '#1a1a2e', fin: 'rgba(192,57,43,0.4)' },
    { body: '#f5a0d0', accent: 'rgba(255,255,255,0.6)', eye: '#2c1a2e', fin: 'rgba(245,160,208,0.4)' },
    { body: '#2c3e50', accent: 'rgba(52,152,219,0.6)', eye: '#f0eef5', fin: 'rgba(44,62,80,0.4)' }
  ];
  for (var i = 0; i < koiCount; i++) {
    var palette = koiColors[i % koiColors.length];
    var baseSize = 18 + Math.random() * 28;
    aqFish.push({
      x: Math.random() * w,
      y: h * 0.15 + Math.random() * h * 0.65,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 0.4,
      size: baseSize,
      angle: Math.random() * Math.PI * 2,
      tailPhase: Math.random() * Math.PI * 2,
      wobblePhase: Math.random() * Math.PI * 2,
      turnSpeed: 0.01 + Math.random() * 0.02,
      targetAngle: Math.random() * Math.PI * 2,
      nextTurnTime: 100 + Math.random() * 300,
      turnTimer: 0,
      body: palette.body,
      accent: palette.accent,
      eye: palette.eye,
      fin: palette.fin,
      speed: 0.5 + Math.random() * 0.8,
      depth: 0.6 + Math.random() * 0.4
    });
  }

  // Bubbles
  var bubbleCount = Math.floor(w / 40);
  for (var b = 0; b < bubbleCount; b++) {
    aqBubbles.push({
      x: Math.random() * w,
      y: h + Math.random() * h,
      r: 1 + Math.random() * 4,
      speed: 0.3 + Math.random() * 0.8,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.03,
      alpha: 0.2 + Math.random() * 0.4
    });
  }

  // Aquatic plants at bottom
  var plantCount = Math.floor(w / 60);
  for (var p = 0; p < plantCount; p++) {
    aqPlants.push({
      x: (p / plantCount) * w + (Math.random() - 0.5) * 40,
      height: 60 + Math.random() * 120,
      segments: 5 + Math.floor(Math.random() * 4),
      phase: Math.random() * Math.PI * 2,
      swaySpeed: 0.008 + Math.random() * 0.012,
      hue: 120 + Math.random() * 60,
      width: 3 + Math.random() * 5
    });
  }

  // Light rays from above
  var rayCount = 5 + Math.floor(w / 200);
  for (var r = 0; r < rayCount; r++) {
    aqLightRays.push({
      x: Math.random() * w,
      width: 30 + Math.random() * 80,
      alpha: 0.02 + Math.random() * 0.04,
      speed: 0.1 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2
    });
  }

  // Floating particles (plankton-like)
  var partCount = Math.floor((w * h) / 8000);
  for (var pp = 0; pp < partCount; pp++) {
    aqParticles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 0.5 + Math.random() * 1.5,
      vx: (Math.random() - 0.5) * 0.2,
      vy: -0.1 - Math.random() * 0.2,
      alpha: 0.15 + Math.random() * 0.3,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.03
    });
  }
}

function drawAqKoiFish(ctx, fish, now) {
  ctx.save();
  ctx.translate(fish.x, fish.y);
  ctx.rotate(fish.angle);
  ctx.globalAlpha = fish.depth;

  var s = fish.size;
  var tailWag = Math.sin(now * 4 + fish.tailPhase) * 0.3;

  // Swimming trail glow
  var trailGrad = ctx.createRadialGradient(s * 0.3, 0, 0, s * 0.3, 0, s * 2);
  trailGrad.addColorStop(0, 'rgba(0,180,216,0.06)');
  trailGrad.addColorStop(1, 'rgba(0,180,216,0)');
  ctx.beginPath();
  ctx.arc(s * 0.3, 0, s * 2, 0, Math.PI * 2);
  ctx.fillStyle = trailGrad;
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(-s * 0.7, 0);
  ctx.quadraticCurveTo(-s * 1.1, -s * 0.35 + tailWag * s * 0.2, -s * 1.3, -s * 0.25 + tailWag * s * 0.3);
  ctx.quadraticCurveTo(-s * 1.0, tailWag * s * 0.1, -s * 1.3, s * 0.25 + tailWag * s * 0.3);
  ctx.quadraticCurveTo(-s * 1.1, s * 0.35 + tailWag * s * 0.2, -s * 0.7, 0);
  ctx.fillStyle = fish.fin;
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.9, s * 0.38, 0, 0, Math.PI * 2);
  ctx.fillStyle = fish.body;
  ctx.fill();

  // Koi markings
  ctx.beginPath();
  ctx.ellipse(s * 0.15, s * 0.08, s * 0.3, s * 0.18, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = fish.accent;
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(-s * 0.2, -s * 0.05, s * 0.15, s * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = fish.accent;
  ctx.globalAlpha = fish.depth * 0.6;
  ctx.fill();
  ctx.globalAlpha = fish.depth;

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(s * 0.1, -s * 0.35);
  ctx.quadraticCurveTo(0, -s * 0.55, -s * 0.2, -s * 0.35);
  ctx.quadraticCurveTo(-s * 0.05, -s * 0.3, s * 0.1, -s * 0.35);
  ctx.fillStyle = fish.fin;
  ctx.fill();

  // Pectoral fins
  ctx.save();
  ctx.translate(s * 0.3, s * 0.25);
  ctx.rotate(0.4 + Math.sin(now * 3) * 0.15);
  ctx.beginPath();
  ctx.ellipse(0, s * 0.12, s * 0.1, s * 0.18, 0, 0, Math.PI * 2);
  ctx.fillStyle = fish.fin;
  ctx.fill();
  ctx.restore();

  // Eye
  ctx.beginPath();
  ctx.arc(s * 0.55, -s * 0.05, s * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = fish.eye;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.57, -s * 0.06, s * 0.03, 0, Math.PI * 2);
  ctx.fillStyle = fish.body === '#0a0912' ? '#5577aa' : '#ffffff';
  ctx.fill();

  ctx.restore();
}

function drawAquarium(timestamp) {
  if (!aqActive) return;
  var now = timestamp ? timestamp / 1000 : 0;
  var w = aqCanvas.width;
  var h = aqCanvas.height;
  aqCtx.clearRect(0, 0, w, h);

  // Deep water gradient background (equinox-style split: dark blue / deep blue-black)
  var cx = w / 2;
  var bgGrad = aqCtx.createLinearGradient(0, 0, w, h);
  bgGrad.addColorStop(0, '#0a2a3a');
  bgGrad.addColorStop(0.3, '#0d3d5c');
  bgGrad.addColorStop(0.5, '#0a3050');
  bgGrad.addColorStop(0.7, '#061e30');
  bgGrad.addColorStop(1, '#020e18');
  aqCtx.fillStyle = bgGrad;
  aqCtx.fillRect(0, 0, w, h);

  // Equinox-style dividing line (subtle vertical shimmer in middle)
  var divGrad = aqCtx.createLinearGradient(cx - 40, 0, cx + 40, 0);
  divGrad.addColorStop(0, 'rgba(0,180,216,0)');
  divGrad.addColorStop(0.5, 'rgba(0,180,216,' + (0.04 + Math.sin(now * 0.5) * 0.02) + ')');
  divGrad.addColorStop(1, 'rgba(0,180,216,0)');
  aqCtx.fillStyle = divGrad;
  aqCtx.fillRect(cx - 40, 0, 80, h);

  // Light rays from above
  aqLightRays.forEach(function(ray) {
    ray.x += Math.sin(now * 0.3 + ray.phase) * ray.speed;
    var alpha = ray.alpha * (0.7 + Math.sin(now * 0.5 + ray.phase) * 0.3);
    var grad = aqCtx.createLinearGradient(ray.x, 0, ray.x, h * 0.8);
    grad.addColorStop(0, 'rgba(120,220,255,' + alpha + ')');
    grad.addColorStop(1, 'rgba(120,220,255,0)');
    aqCtx.beginPath();
    aqCtx.moveTo(ray.x - ray.width / 2, 0);
    aqCtx.lineTo(ray.x + ray.width / 2, 0);
    aqCtx.lineTo(ray.x + ray.width * 0.8, h * 0.8);
    aqCtx.lineTo(ray.x - ray.width * 0.3, h * 0.8);
    aqCtx.closePath();
    aqCtx.fillStyle = grad;
    aqCtx.fill();
  });

  // Floating particles
  aqParticles.forEach(function(p) {
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += p.pulseSpeed;
    if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
    var a = p.alpha * (0.5 + Math.sin(p.pulse) * 0.5);
    aqCtx.beginPath();
    aqCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    aqCtx.fillStyle = 'rgba(180,230,255,' + a + ')';
    aqCtx.fill();
  });

  // Plants at bottom
  aqPlants.forEach(function(plant) {
    var segH = plant.height / plant.segments;
    var baseX = plant.x;
    var baseY = h;
    aqCtx.beginPath();
    aqCtx.moveTo(baseX, baseY);
    for (var seg = 0; seg < plant.segments; seg++) {
      var sway = Math.sin(now * plant.swaySpeed * (seg + 1) + plant.phase) * (seg + 1) * 4;
      var py = baseY - (seg + 1) * segH;
      var px = baseX + sway;
      aqCtx.lineTo(px, py);
    }
    aqCtx.strokeStyle = 'hsla(' + plant.hue + ', 50%, 30%, 0.6)';
    aqCtx.lineWidth = plant.width;
    aqCtx.lineCap = 'round';
    aqCtx.stroke();
    // leaf tips
    var tipX = baseX + Math.sin(now * plant.swaySpeed * plant.segments + plant.phase) * plant.segments * 4;
    var tipY = baseY - plant.height;
    aqCtx.beginPath();
    aqCtx.arc(tipX, tipY, plant.width * 1.2, 0, Math.PI * 2);
    aqCtx.fillStyle = 'hsla(' + plant.hue + ', 50%, 35%, 0.5)';
    aqCtx.fill();
  });

  // Sandy bottom
  var sandGrad = aqCtx.createLinearGradient(0, h - 40, 0, h);
  sandGrad.addColorStop(0, 'rgba(30,60,80,0)');
  sandGrad.addColorStop(0.4, 'rgba(40,70,90,0.3)');
  sandGrad.addColorStop(1, 'rgba(20,50,65,0.7)');
  aqCtx.fillStyle = sandGrad;
  aqCtx.fillRect(0, h - 40, w, 40);

  // Koi fish — update and draw
  aqFish.forEach(function(fish) {
    fish.turnTimer++;
    if (fish.turnTimer >= fish.nextTurnTime) {
      fish.targetAngle = fish.angle + (Math.random() - 0.5) * Math.PI * 0.8;
      fish.nextTurnTime = 100 + Math.random() * 300;
      fish.turnTimer = 0;
    }
    // Smoothly turn toward target
    var angleDiff = fish.targetAngle - fish.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    fish.angle += angleDiff * fish.turnSpeed;

    fish.x += Math.cos(fish.angle) * fish.speed;
    fish.y += Math.sin(fish.angle) * fish.speed;
    fish.wobblePhase += 0.02;
    fish.y += Math.sin(fish.wobblePhase) * 0.3;

    // Wrap around screen
    if (fish.x < -fish.size * 2) fish.x = w + fish.size * 2;
    if (fish.x > w + fish.size * 2) fish.x = -fish.size * 2;
    if (fish.y < h * 0.05) { fish.targetAngle = Math.PI * 0.5; fish.turnTimer = fish.nextTurnTime; }
    if (fish.y > h * 0.88) { fish.targetAngle = -Math.PI * 0.5; fish.turnTimer = fish.nextTurnTime; }

    drawAqKoiFish(aqCtx, fish, now);
  });

  // Bubbles
  aqBubbles.forEach(function(bub) {
    bub.y -= bub.speed;
    bub.wobble += bub.wobbleSpeed;
    bub.x += Math.sin(bub.wobble) * 0.3;
    if (bub.y < -10) {
      bub.y = h + 10 + Math.random() * 50;
      bub.x = Math.random() * w;
    }
    aqCtx.beginPath();
    aqCtx.arc(bub.x, bub.y, bub.r, 0, Math.PI * 2);
    aqCtx.strokeStyle = 'rgba(150,220,255,' + bub.alpha + ')';
    aqCtx.lineWidth = 0.5;
    aqCtx.stroke();
    // highlight
    aqCtx.beginPath();
    aqCtx.arc(bub.x - bub.r * 0.3, bub.y - bub.r * 0.3, bub.r * 0.25, 0, Math.PI * 2);
    aqCtx.fillStyle = 'rgba(200,240,255,' + (bub.alpha * 0.8) + ')';
    aqCtx.fill();
  });

  // Glass panel border effect (aquarium glass)
  aqCtx.strokeStyle = 'rgba(100,200,230,0.06)';
  aqCtx.lineWidth = 3;
  var m = 8;
  aqCtx.strokeRect(m, m, w - m * 2, h - m * 2);
  aqCtx.strokeStyle = 'rgba(100,200,230,0.03)';
  aqCtx.lineWidth = 1;
  aqCtx.strokeRect(m + 4, m + 4, w - (m + 4) * 2, h - (m + 4) * 2);

  aqAnimId = requestAnimationFrame(drawAquarium);
}

var piCanvas = document.getElementById('piCanvas');
var piCtx = piCanvas.getContext('2d');
var piActive = false;
var piAnimId = null;
var piDigits = '1415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989';
var piStreamDigits = [];
var piFloatingSymbols = [];

function resizePiCanvas() {
  piCanvas.width = window.innerWidth;
  piCanvas.height = window.innerHeight;
  if (piActive) initPiElements();
}
window.addEventListener('resize', resizePiCanvas);
resizePiCanvas();

function initPiElements() {
  var w = piCanvas.width;
  var h = piCanvas.height;
  piStreamDigits = [];
  piFloatingSymbols = [];

  // Create falling digit streams (like matrix rain but with pi digits)
  var cols = Math.floor(w / 28);
  for (var i = 0; i < cols; i++) {
    var digitIdx = Math.floor(Math.random() * piDigits.length);
    piStreamDigits.push({
      x: i * 28 + 14,
      y: Math.random() * h * -1,
      speed: 0.4 + Math.random() * 0.8,
      digitIdx: digitIdx,
      len: 8 + Math.floor(Math.random() * 18),
      opacity: 0.15 + Math.random() * 0.25
    });
  }

  // Floating pi symbols in the background
  for (var j = 0; j < 6; j++) {
    piFloatingSymbols.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: 60 + Math.random() * 120,
      drift: (Math.random() - 0.5) * 0.3,
      driftY: (Math.random() - 0.5) * 0.15,
      opacity: 0.03 + Math.random() * 0.05,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.002
    });
  }
}

function drawPi(timestamp) {
  if (!piActive) return;
  var w = piCanvas.width;
  var h = piCanvas.height;
  piCtx.clearRect(0, 0, w, h);

  // Deep navy/indigo gradient background
  var grad = piCtx.createRadialGradient(w * 0.5, h * 0.35, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
  grad.addColorStop(0, '#0d1a3a');
  grad.addColorStop(0.5, '#070e24');
  grad.addColorStop(1, '#030712');
  piCtx.fillStyle = grad;
  piCtx.fillRect(0, 0, w, h);

  // Subtle grid of dots
  piCtx.fillStyle = 'rgba(80, 120, 200, 0.04)';
  for (var gx = 0; gx < w; gx += 40) {
    for (var gy = 0; gy < h; gy += 40) {
      piCtx.beginPath();
      piCtx.arc(gx, gy, 1, 0, Math.PI * 2);
      piCtx.fill();
    }
  }

  // Draw floating pi symbols
  piFloatingSymbols.forEach(function(s) {
    s.x += s.drift;
    s.y += s.driftY;
    s.rotation += s.rotSpeed;
    if (s.x < -s.size) s.x = w + s.size;
    if (s.x > w + s.size) s.x = -s.size;
    if (s.y < -s.size) s.y = h + s.size;
    if (s.y > h + s.size) s.y = -s.size;
    piCtx.save();
    piCtx.translate(s.x, s.y);
    piCtx.rotate(s.rotation);
    piCtx.font = 'bold ' + s.size + 'px "Georgia", serif';
    piCtx.fillStyle = 'rgba(100, 160, 255, ' + s.opacity + ')';
    piCtx.textAlign = 'center';
    piCtx.textBaseline = 'middle';
    piCtx.fillText('\u03C0', 0, 0);
    piCtx.restore();
  });

  // Draw falling digit streams
  // Feynman point: indices 762-767 in the fractional part = "999999"
  // Our piDigits string starts at index 0 = '1' (first fractional digit)
  // So Feynman point is at indices 761-766 in piDigits (0-indexed)
  piStreamDigits.forEach(function(stream) {
    for (var d = 0; d < stream.len; d++) {
      var idx = (stream.digitIdx + d) % piDigits.length;
      var yy = stream.y + d * 22;
      if (yy < -22 || yy > h + 22) continue;

      var fade = 1 - (d / stream.len);
      var isFeynman = idx >= 761 && idx <= 766;

      if (isFeynman) {
        piCtx.font = 'bold 16px "Courier New", monospace';
        piCtx.fillStyle = 'rgba(255, 160, 40, ' + (stream.opacity + 0.35) * fade + ')';
        // Glow
        piCtx.shadowColor = 'rgba(255, 140, 0, 0.6)';
        piCtx.shadowBlur = 10;
      } else if (d === 0) {
        piCtx.font = 'bold 15px "Courier New", monospace';
        piCtx.fillStyle = 'rgba(140, 200, 255, ' + (stream.opacity + 0.3) * fade + ')';
        piCtx.shadowColor = 'rgba(100, 180, 255, 0.4)';
        piCtx.shadowBlur = 6;
      } else {
        piCtx.font = '14px "Courier New", monospace';
        piCtx.fillStyle = 'rgba(70, 130, 220, ' + stream.opacity * fade + ')';
        piCtx.shadowColor = 'transparent';
        piCtx.shadowBlur = 0;
      }

      piCtx.textAlign = 'center';
      piCtx.fillText(piDigits[idx], stream.x, yy);
      piCtx.shadowColor = 'transparent';
      piCtx.shadowBlur = 0;
    }

    stream.y += stream.speed;
    if (stream.y > h + stream.len * 22) {
      stream.y = -stream.len * 22;
      stream.digitIdx = Math.floor(Math.random() * piDigits.length);
      stream.speed = 0.4 + Math.random() * 0.8;
    }
  });

  // Central PI symbol with digit spiral
  var centerX = w * 0.5;
  var centerY = h * 0.42;
  var t = timestamp ? timestamp * 0.0003 : 0;

  // Pulsating glow behind the symbol
  var pulseR = 80 + Math.sin(t * 2) * 15;
  var glowGrad = piCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseR);
  glowGrad.addColorStop(0, 'rgba(80, 140, 255, 0.12)');
  glowGrad.addColorStop(0.5, 'rgba(60, 100, 200, 0.05)');
  glowGrad.addColorStop(1, 'rgba(30, 60, 150, 0)');
  piCtx.fillStyle = glowGrad;
  piCtx.beginPath();
  piCtx.arc(centerX, centerY, pulseR, 0, Math.PI * 2);
  piCtx.fill();

  // The big PI symbol
  piCtx.save();
  piCtx.font = 'bold 120px "Georgia", serif';
  piCtx.textAlign = 'center';
  piCtx.textBaseline = 'middle';

  // Shadow/glow
  piCtx.shadowColor = 'rgba(80, 150, 255, 0.5)';
  piCtx.shadowBlur = 30;
  piCtx.fillStyle = 'rgba(180, 210, 255, 0.7)';
  piCtx.fillText('\u03C0', centerX, centerY);
  piCtx.shadowBlur = 0;

  // Brighter overlay
  piCtx.fillStyle = 'rgba(220, 235, 255, 0.85)';
  piCtx.fillText('\u03C0', centerX, centerY);
  piCtx.restore();

  // Spiral of digits emanating from the symbol
  var spiralDigitCount = 200;
  var spiralStr = '3.' + piDigits;
  for (var si = 0; si < spiralDigitCount && si < spiralStr.length; si++) {
    var angle = t + si * 0.12;
    var radius = 80 + si * 1.8;
    var sx = centerX + Math.cos(angle) * radius;
    var sy = centerY + Math.sin(angle) * radius;

    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;

    var sFade = Math.max(0, 1 - si / spiralDigitCount);
    // Feynman point in spiral: "3." takes 2 chars, so feynman at si = 2+761 to 2+766 = 763 to 768
    var isSpiralFeynman = si >= 763 && si <= 768;

    if (isSpiralFeynman) {
      piCtx.font = 'bold 13px "Courier New", monospace';
      piCtx.fillStyle = 'rgba(255, 160, 40, ' + (0.8 * sFade) + ')';
      piCtx.shadowColor = 'rgba(255, 140, 0, 0.5)';
      piCtx.shadowBlur = 8;
    } else {
      piCtx.font = '11px "Courier New", monospace';
      piCtx.fillStyle = 'rgba(100, 170, 255, ' + (0.4 * sFade) + ')';
      piCtx.shadowColor = 'transparent';
      piCtx.shadowBlur = 0;
    }
    piCtx.textAlign = 'center';
    piCtx.textBaseline = 'middle';
    piCtx.fillText(spiralStr[si], sx, sy);
    piCtx.shadowColor = 'transparent';
    piCtx.shadowBlur = 0;
  }

  // Ticker at the bottom: scrolling pi digits with Feynman point highlighted
  var tickerY = h - 20;
  var tickerSpeed = timestamp ? timestamp * 0.03 : 0;
  var tickerStr = '3.' + piDigits;
  piCtx.font = '13px "Courier New", monospace';
  piCtx.textAlign = 'left';
  var charW = 9;
  var totalChars = Math.ceil(w / charW) + 2;
  var scrollOffset = tickerSpeed % (tickerStr.length * charW);

  for (var ti = 0; ti < totalChars; ti++) {
    var tx = ti * charW - (scrollOffset % (tickerStr.length * charW));
    if (tx < -charW || tx > w + charW) continue;
    var tIdx = Math.floor((ti + Math.floor(scrollOffset / charW)) % tickerStr.length);
    // Feynman at index 763-768 in "3.14159..." string
    var isTickerFeynman = tIdx >= 763 && tIdx <= 768;

    if (isTickerFeynman) {
      piCtx.fillStyle = 'rgba(255, 160, 40, 0.7)';
      piCtx.font = 'bold 13px "Courier New", monospace';
    } else {
      piCtx.fillStyle = 'rgba(80, 130, 200, 0.25)';
      piCtx.font = '13px "Courier New", monospace';
    }
    piCtx.fillText(tickerStr[tIdx], tx, tickerY);
  }

  piAnimId = requestAnimationFrame(drawPi);
}

    html += '<button class="cutscene-option" data-cutscene="luminosity">' +
      '<div class="cutscene-dot" style="background:linear-gradient(135deg, #ffffff, #fffbe6);"></div>' +
      '<div class="cutscene-name">Luminosity</div></button>';
  }

  popup.innerHTML = html;
  document.body.appendChild(popup);

  popup.querySelectorAll('.cutscene-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      playCutscene(btn.getAttribute('data-cutscene'));
    });
  });

  setTimeout(function() {
    document.addEventListener('click', closeCutsceneChooserOutside);
  }, 10);

function closeCutsceneChooser() {
  var popup = document.getElementById('cutsceneChooser');
  if (!popup) return;
  cutsceneChooserOpen = false;
  popup.classList.add('closing');
  setTimeout(function() { popup.remove(); }, 150);
  document.removeEventListener('click', closeCutsceneChooserOutside);
}

function closeCutsceneChooserOutside(e) {
  var popup = document.getElementById('cutsceneChooser');
  var fab = document.getElementById('cutsceneReplayFab');
  if (popup && !popup.contains(e.target) && fab && !fab.contains(e.target)) {
    closeCutsceneChooser();
  }

function toggleBgPopup() {
  if (bgPopupOpen) {
    closeBgPopup();
  } else {
    openBgPopup();
  }
}

function buildBgPopupContent(tab) {
  var html = '<div class="bg-popup-title">Backgrounds</div>';
  html += '<div class="bg-popup-tabs">';
  html += '<button class="bg-popup-tab' + (tab === 'normal' ? ' active' : '') + '" data-tab="normal">Normal</button>';
  html += '<button class="bg-popup-tab' + (tab === 'limited' ? ' active' : '') + '" data-tab="limited">Limited</button>';
  html += '</div>';

  if (tab === 'normal') {
    BG_DEFS.forEach(function(bg) {
      var isUnlocked = unlockedBgs[bg.id];
      var isActive = selectedBg === bg.id;
      var cls = 'bg-option' + (isActive ? ' active' : '') + (!isUnlocked ? ' locked' : '');
      html += '<button class="' + cls + '" data-bg="' + bg.id + '" ' + (!isUnlocked ? 'disabled' : '') + '>' +
        '<div class="bg-dot" style="background:' + bg.color + ';"></div>' +
        '<div><div class="bg-name">' + bg.name + '</div>' +
        '<div class="bg-req">' + (isUnlocked ? (isActive ? '✓ Active' : 'Click to apply') : '🔒 ' + bg.req) + '</div></div></button>';
    });
  } else {
    LIMITED_BG_DEFS.forEach(function(bg) {
      var isUnlocked = unlockedBgs[bg.id];
      var isActive = selectedBg === bg.id;
      var canShow = isUnlocked || bg.obtainable;
      if (!canShow) return;
      var cls = 'bg-option';
      if (isActive) cls += ' active';
      if (!isUnlocked && !bg.obtainable) cls += ' unobtainable';
      else if (!isUnlocked) cls += ' locked';
      html += '<button class="' + cls + '" data-bg="' + bg.id + '" ' + (!isUnlocked ? 'disabled' : '') + '>' +
        '<div class="bg-dot" style="background:' + bg.color + ';"></div>' +
        '<div><div class="bg-name">' + bg.name + ' <span class="bg-limited-badge">Limited</span></div>' +
        '<div class="bg-req">' + (isUnlocked ? (isActive ? '✓ Active' : 'Click to apply') : (bg.obtainable ? '🔒 ' + bg.req : '🚫 No longer available')) + '</div>' +
        (bg.desc ? '<div class="bg-limited-status">' + bg.desc + '</div>' : '') +
        (!isUnlocked && bg.hint ? '<div class="bg-limited-hint">' + bg.hint + '</div>' : '') +
        '</div></button>';
    });
    // Show unobtainable limiteds the user does NOT own (greyed out)
    LIMITED_BG_DEFS.forEach(function(bg) {
      var isUnlocked = unlockedBgs[bg.id];
      if (isUnlocked || bg.obtainable) return;
      html += '<button class="bg-option unobtainable" data-bg="' + bg.id + '" disabled>' +
        '<div class="bg-dot" style="background:' + bg.color + '; filter: grayscale(1);"></div>' +
        '<div><div class="bg-name">' + bg.name + ' <span class="bg-limited-badge" style="opacity:0.5;">Limited</span></div>' +
        '<div class="bg-req">🚫 No longer available</div>' +
        (bg.desc ? '<div class="bg-limited-status">' + bg.desc + '</div>' : '') +
        '</div></button>';
    });
    if (LIMITED_BG_DEFS.length === 0) {
      html += '<div style="padding:12px 8px; color:var(--text-dim); font-size:12px; text-align:center;">No limited backgrounds yet</div>';
    }
  }
  return html;
}

function openBgPopup() {
  if (document.getElementById('bgPopup')) return;
  bgPopupOpen = true;
  var popup = document.createElement('div');
  popup.className = 'bg-popup';
  popup.id = 'bgPopup';

  popup.innerHTML = buildBgPopupContent(bgPopupTab);
  document.body.appendChild(popup);
  bindBgPopupEvents(popup);

  setTimeout(function() {
    document.addEventListener('click', closeBgPopupOutside);
  }, 10);
}

function bindBgPopupEvents(popup) {
  popup.querySelectorAll('.bg-popup-tab').forEach(function(tab) {
    tab.addEventListener('click', function(e) {
      e.stopPropagation();
      bgPopupTab = tab.getAttribute('data-tab');
      popup.innerHTML = buildBgPopupContent(bgPopupTab);
      bindBgPopupEvents(popup);
    });
  });
  popup.querySelectorAll('.bg-option:not(.locked):not(.unobtainable)').forEach(function(btn) {
    btn.addEventListener('click', function() {
      applyBg(btn.getAttribute('data-bg'));
    });
  });
}

function closeBgPopup() {
  var popup = document.getElementById('bgPopup');
  if (!popup) return;
  bgPopupOpen = false;
  popup.classList.add('closing');
  setTimeout(function() { popup.remove(); }, 150);
  document.removeEventListener('click', closeBgPopupOutside);
}

function closeBgPopupOutside(e) {
  var popup = document.getElementById('bgPopup');
  var fab = document.getElementById('bgSelectorFab');
  if (popup && !popup.contains(e.target) && fab && !fab.contains(e.target)) {
    closeBgPopup();
  }
}

function applyBg(bgId) {
  if (!unlockedBgs[bgId]) return;
  selectedBg = bgId;
  bgPinned = (bgId !== 'basic');

  // Persist to gameData
  gameData.pinnedBg = bgPinned ? bgId : null;

  // Clear all active backgrounds
  origSetCyberspace(false);
  origSetDreamspace(false);
  origSetCriticalError(false);
  origSetAtlas(false);
  origSetEquinox(false);
  origSetLuminosity(false);
  origSetAquarium(false);
  origSetPi(false);

  // Apply selected
  if (bgId === 'cyberspace') {
    origSetCyberspace(true);
  } else if (bgId === 'dreamspace') {
    origSetDreamspace(true);
  } else if (bgId === 'criticalerror') {
    origSetCriticalError(true);
  } else if (bgId === 'atlas') {
    origSetAtlas(true);
  } else if (bgId === 'equinox') {
    origSetEquinox(true);
  } else if (bgId === 'luminosity') {
    origSetLuminosity(true);
  } else if (bgId === 'aquarium') {
    origSetAquarium(true);
  } else if (bgId === 'pi') {
    origSetPi(true);
  }

  closeBgPopup();
  renderBgSelector();
}

function restorePinnedBg() {
  if (!bgPinned) return;
  origSetCyberspace(selectedBg === 'cyberspace');
  origSetDreamspace(selectedBg === 'dreamspace');
  origSetCriticalError(selectedBg === 'criticalerror');
  origSetAtlas(selectedBg === 'atlas');
  origSetEquinox(selectedBg === 'equinox');
  origSetLuminosity(selectedBg === 'luminosity');
  origSetAquarium(selectedBg === 'aquarium');
  origSetPi(selectedBg === 'pi');
}

function loadBgState() {
  if (gameData.unlockedBgs) {
    if (gameData.unlockedBgs.dreamspace) unlockedBgs.dreamspace = true;
    if (gameData.unlockedBgs.cyberspace) unlockedBgs.cyberspace = true;
    if (gameData.unlockedBgs.criticalerror) unlockedBgs.criticalerror = true;
    if (gameData.unlockedBgs.atlas) unlockedBgs.atlas = true;
    if (gameData.unlockedBgs.equinox) unlockedBgs.equinox = true;
    if (gameData.unlockedBgs.luminosity) unlockedBgs.luminosity = true;
    if (gameData.unlockedBgs.aquarium) unlockedBgs.aquarium = true;
    if (gameData.unlockedBgs.pi) unlockedBgs.pi = true;
  }
  if (gameData.pinnedBg && unlockedBgs[gameData.pinnedBg]) {
    selectedBg = gameData.pinnedBg;
    bgPinned = true;
    restorePinnedBg();
  }
  renderBgSelector();
}

// ── INIT ──
loadBgState();
render();
