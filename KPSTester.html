const cyberCanvas = document.getElementById('cyberspaceCanvas');
const cyberCtx = cyberCanvas.getContext('2d');
let cyberActive = false;
let cyberAnimId = null;
let cyberColumns = [];
let cyberWelcomeShown = false;

function resizeCyberCanvas() {
  cyberCanvas.width = window.innerWidth;
  cyberCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCyberCanvas);
resizeCyberCanvas();

var cyberScanY = 0;
var cyberNodes = [];
var cyberGridOffset = 0;
var cyberHexChars = '0123456789ABCDEF';
function initCyberColumns() {
  var fontSize = 16;
  var cols = Math.floor(cyberCanvas.width / fontSize);
  cyberColumns = [];
  for (var i = 0; i < cols; i++) {
    cyberColumns.push({
      y: Math.random() * cyberCanvas.height,
      speed: 1 + Math.random() * 5,
      dir: Math.random() > 0.3 ? 1 : -1,
      fontSize: fontSize,
      len: 6 + Math.floor(Math.random() * 12),
      hueShift: Math.random() * 30,
      brightness: 0.5 + Math.random() * 0.5
    });
  }
  cyberNodes = [];
  var nodeCount = 12 + Math.floor(Math.random() * 8);
  for (var n = 0; n < nodeCount; n++) {
    cyberNodes.push({
      x: Math.random() * cyberCanvas.width,
      y: Math.random() * cyberCanvas.height,
      r: 2 + Math.random() * 3,
      pulse: Math.random() * Math.PI * 2,
      connections: []
    });
  }
  for (var ni = 0; ni < cyberNodes.length; ni++) {
    for (var nj = ni + 1; nj < cyberNodes.length; nj++) {
      var dx = cyberNodes[ni].x - cyberNodes[nj].x;
      var dy = cyberNodes[ni].y - cyberNodes[nj].y;
      if (Math.sqrt(dx*dx + dy*dy) < 250) {
        cyberNodes[ni].connections.push(nj);
      }
    }
  }
}

function drawCyberspace() {
  if (!cyberActive) return;
  var w = cyberCanvas.width, h = cyberCanvas.height;
  var isDark = document.documentElement.classList.contains('dark');
  var t = Date.now() * 0.001;

  cyberCtx.fillStyle = isDark ? 'rgba(3,6,20,0.1)' : 'rgba(228,232,245,0.12)';
  cyberCtx.fillRect(0, 0, w, h);

  // Perspective grid on lower third
  cyberGridOffset = (cyberGridOffset + 0.5) % 40;
  var horizon = h * 0.45;
  var gridAlpha = isDark ? 0.06 : 0.04;
  cyberCtx.strokeStyle = isDark ? 'rgba(50,120,255,' + gridAlpha + ')' : 'rgba(10,46,107,' + gridAlpha + ')';
  cyberCtx.lineWidth = 0.5;
  for (var gy = 0; gy < 20; gy++) {
    var py = horizon + Math.pow(gy / 20, 1.8) * (h - horizon) + cyberGridOffset * (gy / 20);
    if (py > h) py -= (h - horizon) * 0.3;
    cyberCtx.beginPath(); cyberCtx.moveTo(0, py); cyberCtx.lineTo(w, py); cyberCtx.stroke();
  }
  for (var gx = -10; gx <= 10; gx++) {
    var topX = w / 2 + gx * 30;
    var botX = w / 2 + gx * (w * 0.08);
    cyberCtx.beginPath(); cyberCtx.moveTo(topX, horizon); cyberCtx.lineTo(botX, h); cyberCtx.stroke();
  }

  // Circuit network nodes and connections
  for (var ni = 0; ni < cyberNodes.length; ni++) {
    var nd = cyberNodes[ni];
    nd.pulse += 0.02;
    var nAlpha = (0.15 + Math.sin(nd.pulse) * 0.1) * (isDark ? 1 : 0.7);
    for (var ci = 0; ci < nd.connections.length; ci++) {
      var other = cyberNodes[nd.connections[ci]];
      cyberCtx.beginPath();
      cyberCtx.moveTo(nd.x, nd.y); cyberCtx.lineTo(other.x, other.y);
      cyberCtx.strokeStyle = isDark ? 'rgba(50,120,255,' + (nAlpha * 0.4) + ')' : 'rgba(10,46,107,' + (nAlpha * 0.3) + ')';
      cyberCtx.lineWidth = 0.6; cyberCtx.stroke();
    }
    var nodeGlow = cyberCtx.createRadialGradient(nd.x, nd.y, 0, nd.x, nd.y, nd.r * 4);
    nodeGlow.addColorStop(0, isDark ? 'rgba(80,160,255,' + (nAlpha * 1.5) + ')' : 'rgba(10,60,140,' + nAlpha + ')');
    nodeGlow.addColorStop(1, 'transparent');
    cyberCtx.fillStyle = nodeGlow;
    cyberCtx.beginPath(); cyberCtx.arc(nd.x, nd.y, nd.r * 4, 0, Math.PI * 2); cyberCtx.fill();
    cyberCtx.beginPath(); cyberCtx.arc(nd.x, nd.y, nd.r, 0, Math.PI * 2);
    cyberCtx.fillStyle = isDark ? 'rgba(100,180,255,' + (nAlpha * 2) + ')' : 'rgba(10,60,140,' + (nAlpha * 1.5) + ')';
    cyberCtx.fill();
  }

  // Data columns — hex codes with varied length trails
  var fontSize = 16;
  cyberCtx.font = '500 ' + fontSize + 'px "Fira Code", monospace';
  for (var i = 0; i < cyberColumns.length; i++) {
    var col = cyberColumns[i];
    var x = i * fontSize;
    var ch = cyberHexChars[Math.floor(Math.random() * 16)];
    var headAlpha = (0.85 + Math.random() * 0.15) * col.brightness;
    cyberCtx.fillStyle = isDark
      ? 'rgba(60,140,255,' + headAlpha + ')'
      : 'rgba(10,46,107,' + headAlpha + ')';
    cyberCtx.fillText(ch, x, col.y);
    for (var tr = 1; tr <= col.len; tr++) {
      var trY = col.y - (tr * fontSize * col.dir);
      var trA = (1 - tr / (col.len + 1)) * 0.35 * col.brightness;
      cyberCtx.fillStyle = isDark
        ? 'rgba(30,80,220,' + trA + ')'
        : 'rgba(10,46,107,' + trA + ')';
      cyberCtx.fillText(cyberHexChars[Math.floor(Math.random() * 16)], x, trY);
    }
    col.y += col.speed * col.dir;
    if (col.dir === 1 && col.y > h + fontSize * col.len) {
      col.y = -fontSize * 5; col.speed = 1 + Math.random() * 5;
    } else if (col.dir === -1 && col.y < -fontSize * col.len) {
      col.y = h + fontSize * 5; col.speed = 1 + Math.random() * 5;
    }
    if (Math.random() < 0.003) col.dir *= -1;
    if (Math.random() < 0.008) col.speed = 1 + Math.random() * 5;
  }

  // Horizontal scan line
  cyberScanY = (cyberScanY + 1.2) % h;
  var scanGrad = cyberCtx.createLinearGradient(0, cyberScanY - 30, 0, cyberScanY + 30);
  scanGrad.addColorStop(0, 'transparent');
  scanGrad.addColorStop(0.5, isDark ? 'rgba(50,140,255,0.07)' : 'rgba(10,60,140,0.04)');
  scanGrad.addColorStop(1, 'transparent');
  cyberCtx.fillStyle = scanGrad;
  cyberCtx.fillRect(0, cyberScanY - 30, w, 60);

  // Subtle horizontal scan lines (CRT effect)
  if (isDark) {
    for (var sl = 0; sl < h; sl += 4) {
      cyberCtx.fillStyle = 'rgba(0,0,0,0.02)';
      cyberCtx.fillRect(0, sl, w, 1);
    }
  }

  cyberAnimId = requestAnimationFrame(drawCyberspace);
}

// ── DREAMSPACE BACKGROUND (25-49 KPS) ──
const dreamCanvas = document.getElementById('dreamspaceCanvas');
const dreamCtx = dreamCanvas.getContext('2d');
let dreamActive = false;
let dreamAnimId = null;
let dreamParticles = [];
let dreamWelcomeShown = false;

function resizeDreamCanvas() {
  dreamCanvas.width = window.innerWidth;
  dreamCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeDreamCanvas);
resizeDreamCanvas();

var dreamAuroraOffset = 0;
var dreamBokeh = [];
function initDreamParticles() {
  dreamParticles = [];
  var w = dreamCanvas.width, h = dreamCanvas.height;
  var count = Math.floor((w * h) / 3200);
  for (var i = 0; i < count; i++) {
    var layer = Math.random();
    var depth = layer < 0.3 ? 0 : layer < 0.7 ? 1 : 2;
    var speed = [0.15, 0.35, 0.7][depth];
    var size = [1, 2.5, 4.5][depth];
    dreamParticles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: size + Math.random() * size,
      dx: (Math.random() - 0.5) * speed,
      dy: -(0.1 + Math.random() * speed),
      alpha: [0.15, 0.35, 0.55][depth] + Math.random() * 0.25,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.008 + Math.random() * 0.025,
      hue: 280 + Math.random() * 80,
      depth: depth,
      wobbleAmp: 0.2 + Math.random() * 0.8,
      wobbleSpeed: 0.003 + Math.random() * 0.008
    });
  }
  dreamBokeh = [];
  for (var b = 0; b < 8; b++) {
    dreamBokeh.push({
      x: Math.random() * w, y: Math.random() * h,
      r: 30 + Math.random() * 80,
      hue: 290 + Math.random() * 60,
      alpha: 0.03 + Math.random() * 0.05,
      dx: (Math.random() - 0.5) * 0.15,
      dy: (Math.random() - 0.5) * 0.1
    });
  }
}

function drawDreamspace() {
  if (!dreamActive) return;
  var w = dreamCanvas.width, h = dreamCanvas.height;
  var isDark = document.documentElement.classList.contains('dark');
  var t = Date.now() * 0.001;

  dreamCtx.fillStyle = isDark ? 'rgba(15,5,20,0.07)' : 'rgba(255,240,250,0.09)';
  dreamCtx.fillRect(0, 0, w, h);

  // Aurora wave bands
  dreamAuroraOffset += 0.003;
  for (var a = 0; a < 3; a++) {
    dreamCtx.beginPath();
    var baseY = h * (0.25 + a * 0.2);
    dreamCtx.moveTo(0, baseY);
    for (var ax = 0; ax <= w; ax += 4) {
      var ay = baseY + Math.sin(ax * 0.003 + dreamAuroraOffset + a * 2) * 40
             + Math.sin(ax * 0.007 - dreamAuroraOffset * 0.7 + a) * 20;
      dreamCtx.lineTo(ax, ay);
    }
    dreamCtx.lineTo(w, h); dreamCtx.lineTo(0, h); dreamCtx.closePath();
    var aHue = 290 + a * 30 + Math.sin(t * 0.2 + a) * 15;
    var aAlpha = isDark ? 0.025 : 0.018;
    var aGrad = dreamCtx.createLinearGradient(0, baseY - 50, 0, baseY + 120);
    aGrad.addColorStop(0, 'hsla(' + aHue + ',70%,65%,' + aAlpha + ')');
    aGrad.addColorStop(0.5, 'hsla(' + aHue + ',80%,55%,' + (aAlpha * 2.5) + ')');
    aGrad.addColorStop(1, 'hsla(' + aHue + ',60%,50%,0)');
    dreamCtx.fillStyle = aGrad;
    dreamCtx.fill();
  }

  // Soft bokeh circles
  for (var b = 0; b < dreamBokeh.length; b++) {
    var bk = dreamBokeh[b];
    bk.x += bk.dx; bk.y += bk.dy;
    if (bk.x < -100) bk.x = w + 100;
    if (bk.x > w + 100) bk.x = -100;
    if (bk.y < -100) bk.y = h + 100;
    if (bk.y > h + 100) bk.y = -100;
    var bkGrad = dreamCtx.createRadialGradient(bk.x, bk.y, 0, bk.x, bk.y, bk.r);
    var bkHue = bk.hue + Math.sin(t * 0.3) * 10;
    bkGrad.addColorStop(0, 'hsla(' + bkHue + ',60%,70%,' + (bk.alpha * 1.5) + ')');
    bkGrad.addColorStop(0.6, 'hsla(' + bkHue + ',50%,60%,' + (bk.alpha * 0.5) + ')');
    bkGrad.addColorStop(1, 'hsla(' + bkHue + ',40%,50%,0)');
    dreamCtx.fillStyle = bkGrad;
    dreamCtx.beginPath();
    dreamCtx.arc(bk.x, bk.y, bk.r, 0, Math.PI * 2);
    dreamCtx.fill();
  }

  // Draw particles with constellation connections
  var connectDist = 100;
  for (var i = 0; i < dreamParticles.length; i++) {
    var p = dreamParticles[i];
    p.pulse += p.pulseSpeed;
    var glow = 0.5 + Math.sin(p.pulse) * 0.5;
    var alpha = p.alpha * (0.4 + glow * 0.6);
    var radius = p.r * (0.8 + glow * 0.4);

    // Connections to nearby same-depth or adjacent-depth particles
    if (p.depth >= 1) {
      for (var j = i + 1; j < dreamParticles.length && j < i + 30; j++) {
        var q = dreamParticles[j];
        if (Math.abs(p.depth - q.depth) > 1) continue;
        var ddx = p.x - q.x, ddy = p.y - q.y;
        var dist = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dist < connectDist) {
          var lineAlpha = (1 - dist / connectDist) * 0.12 * (p.depth === 2 ? 1.5 : 0.7);
          var lineHue = (p.hue + q.hue) / 2;
          dreamCtx.beginPath();
          dreamCtx.moveTo(p.x, p.y);
          dreamCtx.lineTo(q.x, q.y);
          dreamCtx.strokeStyle = isDark
            ? 'hsla(' + lineHue + ',60%,70%,' + lineAlpha + ')'
            : 'hsla(' + lineHue + ',50%,50%,' + (lineAlpha * 0.7) + ')';
          dreamCtx.lineWidth = 0.5 + p.depth * 0.3;
          dreamCtx.stroke();
        }
      }
    }

    // Particle glow
    var grad = dreamCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 3);
    if (isDark) {
      grad.addColorStop(0, 'hsla(' + p.hue + ',80%,75%,' + alpha + ')');
      grad.addColorStop(0.4, 'hsla(' + p.hue + ',70%,60%,' + (alpha * 0.35) + ')');
      grad.addColorStop(1, 'hsla(' + p.hue + ',60%,50%,0)');
    } else {
      grad.addColorStop(0, 'hsla(' + p.hue + ',60%,55%,' + (alpha * 0.8) + ')');
      grad.addColorStop(0.4, 'hsla(' + p.hue + ',50%,45%,' + (alpha * 0.25) + ')');
      grad.addColorStop(1, 'hsla(' + p.hue + ',40%,40%,0)');
    }
    dreamCtx.beginPath();
    dreamCtx.arc(p.x, p.y, radius * 3, 0, Math.PI * 2);
    dreamCtx.fillStyle = grad;
    dreamCtx.fill();

    // Inner bright core with sparkle
    var sparkle = Math.sin(p.pulse * 3) > 0.7 ? 1.4 : 1;
    dreamCtx.beginPath();
    dreamCtx.arc(p.x, p.y, radius * 0.5 * sparkle, 0, Math.PI * 2);
    dreamCtx.fillStyle = isDark
      ? 'hsla(' + p.hue + ',90%,88%,' + (alpha * 0.9) + ')'
      : 'hsla(' + p.hue + ',70%,65%,' + (alpha * 0.7) + ')';
    dreamCtx.fill();

    // Movement with wobble
    p.x += p.dx + Math.sin(p.pulse * p.wobbleSpeed * 100) * p.wobbleAmp;
    p.y += p.dy;
    p.hue += Math.sin(t * 0.1 + i) * 0.08;

    if (p.y < -20) { p.y = h + 10; p.x = Math.random() * w; }
    if (p.x < -20) p.x = w + 10;
    if (p.x > w + 20) p.x = -10;
  }

  dreamAnimId = requestAnimationFrame(drawDreamspace);
}

const critCanvas = document.getElementById('criticalErrorCanvas');
const critCtx = critCanvas.getContext('2d');
let critActive = false;
let critAnimId = null;
let critColumns = [];
let critWelcomeShown = false;
let critWarningX = 0;
let critWarningDir = 1;
let critLightning = [];
let critGlitchTimer = 0;
let critGlitchActive = false;

let critHexGrid = [];
let critErrorFragments = [];
let critVignettePhase = 0;
const CRIT_CHARS = '\u2620\u2622\u2623\u26A0\u2716\u2718\u26D4\u2606\u25B2\u25BC\u2666\u2660\u25A0\u2593\u2591\u00A7\u00B6\u2020\u2021\u00A4\u00BF\u00A1\u03A9\u03A8\u03A3\u0394\u039B\u2260\u2248\u221E\u2261\u203C\u2047\u2049\u2602\u2604';
const CRIT_ERROR_MSGS = ['SYSTEM FAILURE', 'MEMORY CORRUPT', 'STACK OVERFLOW', 'SEGFAULT', 'KERNEL PANIC', 'DATA LOSS', 'FATAL EXCEPTION', '0xDEADBEEF', 'ERR_OVERFLOW', 'ABORT RETRY', 'NULL_PTR', 'HEAP CORRUPT', 'BUS ERROR', 'ACCESS DENIED'];

function resizeCritCanvas() {
  critCanvas.width = window.innerWidth;
  critCanvas.height = window.innerHeight;
  if (critActive) { initCritColumns(); initCritHexGrid(); initCritErrorFragments(); }
}
window.addEventListener('resize', resizeCritCanvas);
resizeCritCanvas();

function initCritColumns() {
  var fontSize = 16;
  var cols = Math.floor(critCanvas.width / fontSize);
  critColumns = [];
  for (var i = 0; i < cols; i++) {
    critColumns.push({
      y: Math.random() * critCanvas.height,
      speed: 1.2 + Math.random() * 3.5,
      dir: Math.random() > 0.5 ? 1 : -1,
      fontSize: fontSize,
      brightness: 0.5 + Math.random() * 0.5
    });
  }
  critWarningX = critCanvas.width * 0.5;
  critWarningDir = 1;
}

function initCritHexGrid() {
  critHexGrid = [];
  var spacing = 80;
  var cols = Math.ceil(critCanvas.width / spacing) + 1;
  var rows = Math.ceil(critCanvas.height / (spacing * 0.866)) + 1;
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      critHexGrid.push({
        x: c * spacing + (r % 2) * spacing * 0.5,
        y: r * spacing * 0.866,
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.002 + Math.random() * 0.004
      });
    }
  }
}

function initCritErrorFragments() {
  critErrorFragments = [];
  var count = Math.floor((critCanvas.width * critCanvas.height) / 40000);
  for (var i = 0; i < count; i++) {
    critErrorFragments.push({
      x: Math.random() * critCanvas.width,
      y: Math.random() * critCanvas.height,
      text: CRIT_ERROR_MSGS[Math.floor(Math.random() * CRIT_ERROR_MSGS.length)],
      opacity: 0,
      targetOpacity: 0,
      flickerTimer: Math.random() * 300,
      size: 9 + Math.random() * 5
    });
  }
}

function generateLightningBolt(x1, y1, x2, y2, depth) {
  if (depth <= 0) return [{ x: x1, y: y1 }, { x: x2, y: y2 }];
  var mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 60 * (depth / 3);
  var my = (y1 + y2) / 2 + (Math.random() - 0.5) * 60 * (depth / 3);
  var left = generateLightningBolt(x1, y1, mx, my, depth - 1);
  var right = generateLightningBolt(mx, my, x2, y2, depth - 1);
  return left.concat(right.slice(1));
}

function drawCriticalError() {
  if (!critActive) return;
  var w = critCanvas.width;
  var h = critCanvas.height;
  var isDark = document.documentElement.classList.contains('dark');
  var now = Date.now();

  // Adaptive fade trail
  critCtx.fillStyle = isDark ? 'rgba(12,1,1,0.12)' : 'rgba(255,240,240,0.14)';
  critCtx.fillRect(0, 0, w, h);

  // ── Pulsing vignette ──
  critVignettePhase += 0.015;
  var vigStrength = 0.3 + Math.sin(critVignettePhase) * 0.15;
  var vig = critCtx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.2, w / 2, h / 2, Math.max(w, h) * 0.75);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, isDark ? 'rgba(0,0,0,' + vigStrength + ')' : 'rgba(80,0,0,' + (vigStrength * 0.3) + ')');
  critCtx.fillStyle = vig;
  critCtx.fillRect(0, 0, w, h);

  // ── Hex warning grid (subtle pulsing hexagons) ──
  for (var hi = 0; hi < critHexGrid.length; hi++) {
    var hex = critHexGrid[hi];
    var hAlpha = (Math.sin(now * hex.pulseSpeed + hex.phase) + 1) * 0.5;
    if (hAlpha < 0.3) continue;
    hAlpha *= isDark ? 0.06 : 0.04;
    critCtx.beginPath();
    for (var s = 0; s < 6; s++) {
      var angle = Math.PI / 3 * s - Math.PI / 6;
      var hx = hex.x + 18 * Math.cos(angle);
      var hy = hex.y + 18 * Math.sin(angle);
      if (s === 0) critCtx.moveTo(hx, hy);
      else critCtx.lineTo(hx, hy);
    }
    critCtx.closePath();
    critCtx.strokeStyle = isDark ? 'rgba(255,30,30,' + hAlpha + ')' : 'rgba(160,0,0,' + hAlpha + ')';
    critCtx.lineWidth = 0.6;
    critCtx.stroke();
  }

  // ── Raining hazard chars ──
  var fontSize = 16;
  var charsLen = CRIT_CHARS.length;
  critCtx.font = '500 ' + fontSize + 'px "Fira Code",monospace';

  for (var i = 0; i < critColumns.length; i++) {
    var col = critColumns[i];
    var x = i * fontSize;
    var ch = CRIT_CHARS[Math.floor(Math.random() * charsLen)];

    // Head char with intensity variation
    var ha = col.brightness * (0.8 + Math.random() * 0.2);
    critCtx.fillStyle = isDark
      ? 'rgba(255,' + Math.floor(15 + Math.random() * 20) + ',' + Math.floor(15 + Math.random() * 20) + ',' + ha + ')'
      : 'rgba(' + Math.floor(150 + Math.random() * 50) + ',0,0,' + ha + ')';
    critCtx.fillText(ch, x, col.y);

    // Trail with gradient fade
    for (var t = 1; t <= 9; t++) {
      var ty = col.y - (t * fontSize * col.dir);
      var ta = (1 - t / 10) * 0.35 * col.brightness;
      if (ta < 0.02) continue;
      critCtx.fillStyle = isDark
        ? 'rgba(180,5,5,' + ta + ')'
        : 'rgba(120,0,0,' + ta + ')';
      critCtx.fillText(CRIT_CHARS[Math.floor(Math.random() * charsLen)], x, ty);
    }

    col.y += col.speed * col.dir;
    if (col.dir === 1 && col.y > h + fontSize * 11) {
      col.y = -fontSize * 5;
      col.speed = 1.2 + Math.random() * 3.5;
      col.brightness = 0.5 + Math.random() * 0.5;
    } else if (col.dir === -1 && col.y < -fontSize * 11) {
      col.y = h + fontSize * 5;
      col.speed = 1.2 + Math.random() * 3.5;
      col.brightness = 0.5 + Math.random() * 0.5;
    }
    if (Math.random() < 0.003) col.dir *= -1;
    if (Math.random() < 0.01) col.speed = 1.2 + Math.random() * 3.5;
  }

  // ── Screen glitch / tear effect ──
  critGlitchTimer--;
  if (critGlitchTimer <= 0) {
    critGlitchActive = Math.random() < 0.35;
    critGlitchTimer = critGlitchActive ? (3 + Math.floor(Math.random() * 8)) : (40 + Math.floor(Math.random() * 120));
    critGlitchOffset = (Math.random() - 0.5) * 30;
  }
  if (critGlitchActive) {
    var tearY = Math.random() * h;
    var tearH = 2 + Math.random() * 20;
    var imgData = critCtx.getImageData(0, Math.max(0, Math.floor(tearY)), w, Math.min(Math.floor(tearH), h - Math.floor(tearY)));
    critCtx.putImageData(imgData, critGlitchOffset, Math.floor(tearY));
    // Color channel split on random strips
    if (Math.random() < 0.5) {
      var stripY = Math.random() * h;
      var stripH = 1 + Math.random() * 6;
      critCtx.fillStyle = isDark ? 'rgba(255,0,0,0.08)' : 'rgba(255,0,0,0.05)';
      critCtx.fillRect(0, stripY, w, stripH);
      critCtx.fillStyle = isDark ? 'rgba(0,0,0,0.12)' : 'rgba(0,0,0,0.05)';
      critCtx.fillRect(0, stripY + stripH, w, stripH * 0.5);
    }
  }

  // ── Lightning arcs ──
  if (Math.random() < 0.02) {
    var lx1 = Math.random() * w;
    var ly1 = Math.random() * h * 0.3;
    var lx2 = lx1 + (Math.random() - 0.5) * 200;
    var ly2 = ly1 + 100 + Math.random() * 200;
    critLightning.push({ points: generateLightningBolt(lx1, ly1, lx2, ly2, 4), life: 1.0, decay: 0.06 + Math.random() * 0.08 });
  }
  for (var li = critLightning.length - 1; li >= 0; li--) {
    var bolt = critLightning[li];
    bolt.life -= bolt.decay;
    if (bolt.life <= 0) { critLightning.splice(li, 1); continue; }
    critCtx.beginPath();
    critCtx.moveTo(bolt.points[0].x, bolt.points[0].y);
    for (var bp = 1; bp < bolt.points.length; bp++) {
      critCtx.lineTo(bolt.points[bp].x, bolt.points[bp].y);
    }
    critCtx.strokeStyle = isDark
      ? 'rgba(255,60,60,' + (bolt.life * 0.7) + ')'
      : 'rgba(200,0,0,' + (bolt.life * 0.5) + ')';
    critCtx.lineWidth = bolt.life * 2.5;
    critCtx.shadowColor = isDark ? 'rgba(255,20,20,0.8)' : 'rgba(200,0,0,0.5)';
    critCtx.shadowBlur = bolt.life * 20;
    critCtx.stroke();
    // Bright core
    critCtx.strokeStyle = isDark
      ? 'rgba(255,180,180,' + (bolt.life * 0.4) + ')'
      : 'rgba(255,100,100,' + (bolt.life * 0.3) + ')';
    critCtx.lineWidth = bolt.life * 0.8;
    critCtx.stroke();
    critCtx.shadowBlur = 0;
  }

  // ── Floating error fragments ──
  for (var fi = 0; fi < critErrorFragments.length; fi++) {
    var frag = critErrorFragments[fi];
    frag.flickerTimer -= 1;
    if (frag.flickerTimer <= 0) {
      frag.targetOpacity = Math.random() < 0.6 ? 0 : (0.15 + Math.random() * 0.35);
      frag.flickerTimer = 50 + Math.random() * 250;
      if (Math.random() < 0.2) frag.text = CRIT_ERROR_MSGS[Math.floor(Math.random() * CRIT_ERROR_MSGS.length)];
    }
    frag.opacity += (frag.targetOpacity - frag.opacity) * 0.08;
    if (frag.opacity < 0.03) continue;
    critCtx.font = frag.size + 'px "Fira Code",monospace';
    critCtx.fillStyle = isDark
      ? 'rgba(255,40,40,' + frag.opacity + ')'
      : 'rgba(160,0,0,' + (frag.opacity * 0.7) + ')';
    critCtx.fillText(frag.text, frag.x, frag.y);
  }

  // ── Multiple orbiting warning signs ──
  var warnCount = 3;
  for (var wi = 0; wi < warnCount; wi++) {
    var wPhase = now * 0.001 + (wi * Math.PI * 2 / warnCount);
    var wRadius = Math.min(w, h) * 0.3;
    var wx = w / 2 + Math.cos(wPhase) * wRadius * (0.6 + Math.sin(now * 0.0003 + wi) * 0.4);
    var wy = h / 2 + Math.sin(wPhase * 1.3) * wRadius * 0.5 + Math.sin(now * 0.002 + wi) * 20;
    var pulse = 0.4 + Math.sin(now * 0.006 + wi * 2) * 0.4;
    var wSize = 28 + Math.sin(now * 0.003 + wi) * 10;
    critCtx.font = 'bold ' + Math.floor(wSize) + 'px sans-serif';
    critCtx.fillStyle = isDark
      ? 'rgba(255,40,40,' + pulse + ')'
      : 'rgba(200,0,0,' + (pulse * 0.8) + ')';
    critCtx.shadowColor = isDark ? 'rgba(255,0,0,0.6)' : 'rgba(200,0,0,0.3)';
    critCtx.shadowBlur = 15;
    critCtx.textAlign = 'center';
    critCtx.fillText('\u26A0', wx, wy);
    critCtx.shadowBlur = 0;
    critCtx.textAlign = 'left';
  }

  // ── Static noise patches ──
  if (Math.random() < 0.15) {
    var sx = Math.random() * w;
    var sy = Math.random() * h;
    var sw = 20 + Math.random() * 80;
    var sh = 2 + Math.random() * 15;
    var sImgData = critCtx.createImageData(Math.floor(sw), Math.floor(sh));
    for (var sp = 0; sp < sImgData.data.length; sp += 4) {
      var sv = Math.random() * (isDark ? 60 : 40);
      sImgData.data[sp] = isDark ? sv + 40 : sv + 80;
      sImgData.data[sp + 1] = sv * 0.1;
      sImgData.data[sp + 2] = sv * 0.1;
      sImgData.data[sp + 3] = Math.random() * 80;
    }
    critCtx.putImageData(sImgData, sx, sy);
  }

  critAnimId = requestAnimationFrame(drawCriticalError);
}

function showCritWelcome() {
  var existing = document.querySelector('.criticalerror-welcome');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'criticalerror-welcome';
  el.textContent = '\u26A0 CRITICAL ERROR \u26A0';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 5000);
}

function setCriticalError(active) {
  if (active && !critActive) {
    critActive = true;
    document.body.classList.add('criticalerror-active');
    critCanvas.classList.add('active');
    critCtx.clearRect(0, 0, critCanvas.width, critCanvas.height);
    var isDark = document.documentElement.classList.contains('dark');
    critCtx.fillStyle = isDark ? 'rgba(12,1,1,1)' : 'rgba(255,240,240,1)';
    critCtx.fillRect(0, 0, critCanvas.width, critCanvas.height);
    initCritColumns();
    initCritHexGrid();
    initCritErrorFragments();
    critLightning = [];
    drawCriticalError();
    showCritWelcome();
    if (!unlockedBgs.criticalerror) {
      unlockedBgs.criticalerror = true;
      gameData.unlockedBgs.criticalerror = true;
      // Also unlock all lower tiers
      if (!unlockedBgs.cyberspace) {
        unlockedBgs.cyberspace = true;
        gameData.unlockedBgs.cyberspace = true;
      }
      if (!unlockedBgs.dreamspace) {
        unlockedBgs.dreamspace = true;
        gameData.unlockedBgs.dreamspace = true;
      }
      renderBgSelector();
    }
  } else if (!active && critActive) {
    critActive = false;
    document.body.classList.remove('criticalerror-active');
    critCanvas.classList.remove('active');
    if (critAnimId) {
      cancelAnimationFrame(critAnimId);
      critAnimId = null;
    }
  }
}

// ── ATLAS BACKGROUND (75+ KPS) ──
const atlasCanvas = document.getElementById('atlasCanvas');
const atlasCtx = atlasCanvas.getContext('2d');
var atlasActive = false;
var atlasAnimId = null;
var atlasGlobeAngle = 0;
var atlasNumbers = [];
var atlasStars = [];
var atlasDataNodes = [];
var atlasOrbitalParticles = [];
var atlasScanAngle = 0;
var atlasAuroraPhase = 0;

function resizeAtlasCanvas() {
  atlasCanvas.width = window.innerWidth;
  atlasCanvas.height = window.innerHeight;
  if (atlasActive) { initAtlasNumbers(); initAtlasStars(); initAtlasDataNodes(); initAtlasOrbitalParticles(); }
}
window.addEventListener('resize', resizeAtlasCanvas);
resizeAtlasCanvas();

function initAtlasStars() {
  atlasStars = [];
  var count = Math.floor((atlasCanvas.width * atlasCanvas.height) / 2500);
  for (var i = 0; i < count; i++) {
    atlasStars.push({
      x: Math.random() * atlasCanvas.width,
      y: Math.random() * atlasCanvas.height,
      size: 0.3 + Math.random() * 1.8,
      twinkleSpeed: 0.003 + Math.random() * 0.008,
      twinklePhase: Math.random() * Math.PI * 2,
      baseOpacity: 0.2 + Math.random() * 0.6
    });
  }
}

function initAtlasDataNodes() {
  atlasDataNodes = [];
  var count = 18 + Math.floor(Math.random() * 10);
  for (var i = 0; i < count; i++) {
    var lat = (Math.random() - 0.5) * Math.PI * 0.85;
    var lng = Math.random() * Math.PI * 2;
    atlasDataNodes.push({
      lat: lat,
      lng: lng,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.04,
      size: 1.5 + Math.random() * 2.5,
      connections: []
    });
  }
  // Create connection pairs (nearest neighbours)
  for (var a = 0; a < atlasDataNodes.length; a++) {
    for (var b = a + 1; b < atlasDataNodes.length; b++) {
      var dLat = atlasDataNodes[a].lat - atlasDataNodes[b].lat;
      var dLng = atlasDataNodes[a].lng - atlasDataNodes[b].lng;
      var dist = Math.sqrt(dLat * dLat + dLng * dLng);
      if (dist < 1.2 && Math.random() < 0.5) {
        atlasDataNodes[a].connections.push(b);
      }
    }
  }
}

function initAtlasOrbitalParticles() {
  atlasOrbitalParticles = [];
  var count = 30 + Math.floor(Math.random() * 20);
  for (var i = 0; i < count; i++) {
    var ringIdx = Math.floor(Math.random() * 3);
    atlasOrbitalParticles.push({
      angle: Math.random() * Math.PI * 2,
      speed: (0.004 + Math.random() * 0.01) * (Math.random() > 0.5 ? 1 : -1),
      ring: ringIdx,
      tilt: 0.2 + ringIdx * 0.3,
      size: 0.8 + Math.random() * 1.5,
      opacity: 0.3 + Math.random() * 0.5
    });
  }
}

function initAtlasNumbers() {
  atlasNumbers = [];
  var count = Math.floor((atlasCanvas.width * atlasCanvas.height) / 7000);
  for (var i = 0; i < count; i++) {
    atlasNumbers.push({
      x: Math.random() * atlasCanvas.width,
      y: Math.random() * atlasCanvas.height,
      speed: 0.2 + Math.random() * 0.9,
      dir: Math.random() > 0.5 ? 1 : -1,
      char: String.fromCharCode(48 + Math.floor(Math.random() * 10)),
      size: 9 + Math.random() * 7,
      opacity: 0.08 + Math.random() * 0.2,
      yDrift: (Math.random() - 0.5) * 0.3
    });
  }
}

function drawAtlas() {
  if (!atlasActive) return;
  var w = atlasCanvas.width;
  var h = atlasCanvas.height;
  var isDark = document.documentElement.classList.contains('dark');
  var now = Date.now();

  // Clear with slight trail
  atlasCtx.fillStyle = isDark ? 'rgba(6,14,28,0.14)' : 'rgba(218,236,248,0.16)';
  atlasCtx.fillRect(0, 0, w, h);

  // ── Starfield ──
  for (var si = 0; si < atlasStars.length; si++) {
    var star = atlasStars[si];
    var twinkle = star.baseOpacity * (0.5 + 0.5 * Math.sin(now * star.twinkleSpeed + star.twinklePhase));
    if (twinkle < 0.05) continue;
    atlasCtx.beginPath();
    atlasCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    atlasCtx.fillStyle = isDark
      ? 'rgba(140,200,255,' + twinkle + ')'
      : 'rgba(26,111,160,' + (twinkle * 0.4) + ')';
    atlasCtx.fill();
  }

  var cx = w / 2;
  var cy = h / 2;
  var radius = Math.min(w, h) * 0.26;

  atlasGlobeAngle += 0.003;
  atlasScanAngle += 0.008;
  atlasAuroraPhase += 0.006;

  // ── Atmospheric aurora glow ──
  for (var ai = 0; ai < 4; ai++) {
    var aPhase = atlasAuroraPhase + ai * 1.5;
    var aAngle = aPhase;
    var ax = cx + Math.cos(aAngle) * radius * 1.15;
    var ay = cy + Math.sin(aAngle * 0.7) * radius * 0.5;
    var aGlow = atlasCtx.createRadialGradient(ax, ay, 0, ax, ay, radius * 0.7);
    var aOp = 0.025 + Math.sin(now * 0.002 + ai) * 0.015;
    aGlow.addColorStop(0, isDark ? 'rgba(60,180,235,' + aOp + ')' : 'rgba(26,111,160,' + (aOp * 0.6) + ')');
    aGlow.addColorStop(0.5, isDark ? 'rgba(30,100,200,' + (aOp * 0.5) + ')' : 'rgba(26,80,140,' + (aOp * 0.3) + ')');
    aGlow.addColorStop(1, 'transparent');
    atlasCtx.fillStyle = aGlow;
    atlasCtx.fillRect(0, 0, w, h);
  }

  // ── Globe outer glow (enhanced multi-layer) ──
  var glow1 = atlasCtx.createRadialGradient(cx, cy, radius * 0.5, cx, cy, radius * 1.8);
  glow1.addColorStop(0, isDark ? 'rgba(91,192,235,0.07)' : 'rgba(26,111,160,0.04)');
  glow1.addColorStop(0.6, isDark ? 'rgba(40,120,200,0.03)' : 'rgba(26,90,140,0.02)');
  glow1.addColorStop(1, 'transparent');
  atlasCtx.fillStyle = glow1;
  atlasCtx.fillRect(0, 0, w, h);

  // ── Orbital rings ──
  var ringTilts = [0.25, 0.55, 0.85];
  var ringRadii = [1.25, 1.45, 1.65];
  for (var ri = 0; ri < 3; ri++) {
    atlasCtx.beginPath();
    atlasCtx.save();
    atlasCtx.translate(cx, cy);
    atlasCtx.rotate(0.3 + ri * 0.4);
    atlasCtx.scale(1, ringTilts[ri]);
    atlasCtx.arc(0, 0, radius * ringRadii[ri], 0, Math.PI * 2);
    atlasCtx.restore();
    atlasCtx.strokeStyle = isDark ? 'rgba(91,192,235,0.08)' : 'rgba(26,111,160,0.06)';
    atlasCtx.lineWidth = 0.6;
    atlasCtx.setLineDash([4, 8]);
    atlasCtx.stroke();
    atlasCtx.setLineDash([]);
  }

  // ── Orbital particles ──
  for (var oi = 0; oi < atlasOrbitalParticles.length; oi++) {
    var op = atlasOrbitalParticles[oi];
    op.angle += op.speed;
    var oRad = radius * ringRadii[op.ring];
    var oRot = 0.3 + op.ring * 0.4;
    var rawX = Math.cos(op.angle) * oRad;
    var rawY = Math.sin(op.angle) * oRad * ringTilts[op.ring];
    var cosR = Math.cos(oRot);
    var sinR = Math.sin(oRot);
    var opx = cx + rawX * cosR - rawY * sinR;
    var opy = cy + rawX * sinR + rawY * cosR;
    atlasCtx.beginPath();
    atlasCtx.arc(opx, opy, op.size, 0, Math.PI * 2);
    atlasCtx.fillStyle = isDark
      ? 'rgba(100,200,255,' + op.opacity + ')'
      : 'rgba(26,111,160,' + (op.opacity * 0.6) + ')';
    atlasCtx.fill();
  }

  // ── Globe outline with gradient ──
  atlasCtx.beginPath();
  atlasCtx.arc(cx, cy, radius, 0, Math.PI * 2);
  var rimGrad = atlasCtx.createLinearGradient(cx - radius, cy - radius, cx + radius, cy + radius);
  rimGrad.addColorStop(0, isDark ? 'rgba(91,192,235,0.35)' : 'rgba(26,111,160,0.25)');
  rimGrad.addColorStop(0.5, isDark ? 'rgba(60,150,220,0.2)' : 'rgba(26,90,140,0.15)');
  rimGrad.addColorStop(1, isDark ? 'rgba(91,192,235,0.3)' : 'rgba(26,111,160,0.2)');
  atlasCtx.strokeStyle = rimGrad;
  atlasCtx.lineWidth = 1.8;
  atlasCtx.stroke();

  // Inner atmosphere rim
  atlasCtx.beginPath();
  atlasCtx.arc(cx, cy, radius - 2, 0, Math.PI * 2);
  atlasCtx.strokeStyle = isDark ? 'rgba(91,192,235,0.08)' : 'rgba(26,111,160,0.05)';
  atlasCtx.lineWidth = 3;
  atlasCtx.stroke();

  // ── Latitude lines ──
  for (var lat = -60; lat <= 60; lat += 30) {
    var latRad = lat * Math.PI / 180;
    var ry = Math.cos(latRad) * radius;
    var yPos = cy - Math.sin(latRad) * radius;
    atlasCtx.beginPath();
    atlasCtx.ellipse(cx, yPos, ry, Math.abs(ry * 0.12) + 1, 0, 0, Math.PI * 2);
    atlasCtx.strokeStyle = isDark ? 'rgba(91,192,235,0.1)' : 'rgba(26,111,160,0.07)';
    atlasCtx.lineWidth = 0.6;
    atlasCtx.stroke();
  }

  // ── Longitude lines (rotating) ──
  for (var lng = 0; lng < 360; lng += 30) {
    var lngRad = (lng + atlasGlobeAngle * 180 / Math.PI) * Math.PI / 180;
    var xScale = Math.cos(lngRad);
    atlasCtx.beginPath();
    for (var a = -90; a <= 90; a += 3) {
      var aRad = a * Math.PI / 180;
      var px = cx + xScale * Math.cos(aRad) * radius;
      var py = cy - Math.sin(aRad) * radius;
      if (a === -90) atlasCtx.moveTo(px, py);
      else atlasCtx.lineTo(px, py);
    }
    atlasCtx.strokeStyle = isDark ? 'rgba(91,192,235,0.08)' : 'rgba(26,111,160,0.06)';
    atlasCtx.lineWidth = 0.6;
    atlasCtx.stroke();
  }

  // ── Continents (enhanced with inner glow) ──
  drawContinentBlob(atlasCtx, cx, cy, radius, atlasGlobeAngle, isDark);

  // ── Data nodes on globe surface ──
  for (var ni = 0; ni < atlasDataNodes.length; ni++) {
    var node = atlasDataNodes[ni];
    var nLng = node.lng + atlasGlobeAngle;
    var nxProj = Math.cos(nLng);
    if (nxProj < -0.1) continue;
    var nFade = Math.max(0, Math.min(1, (nxProj + 0.1) / 0.5));
    var nx = cx + nxProj * Math.cos(node.lat) * radius;
    var ny = cy - Math.sin(node.lat) * radius;
    var nPulse = 0.5 + 0.5 * Math.sin(now * node.pulseSpeed + node.pulsePhase);
    var nAlpha = nFade * (0.4 + nPulse * 0.5);

    // Draw connections first
    for (var ci = 0; ci < node.connections.length; ci++) {
      var target = atlasDataNodes[node.connections[ci]];
      var tLng = target.lng + atlasGlobeAngle;
      var txProj = Math.cos(tLng);
      if (txProj < -0.1) continue;
      var tFade = Math.max(0, Math.min(1, (txProj + 0.1) / 0.5));
      var tx = cx + txProj * Math.cos(target.lat) * radius;
      var ty = cy - Math.sin(target.lat) * radius;
      atlasCtx.beginPath();
      atlasCtx.moveTo(nx, ny);
      atlasCtx.lineTo(tx, ty);
      atlasCtx.strokeStyle = isDark
        ? 'rgba(91,192,235,' + (Math.min(nFade, tFade) * 0.15) + ')'
        : 'rgba(26,111,160,' + (Math.min(nFade, tFade) * 0.1) + ')';
      atlasCtx.lineWidth = 0.5;
      atlasCtx.stroke();
    }

    // Node glow
    var nodeGlow = atlasCtx.createRadialGradient(nx, ny, 0, nx, ny, node.size * 4);
    nodeGlow.addColorStop(0, isDark ? 'rgba(91,192,235,' + (nAlpha * 0.3) + ')' : 'rgba(26,111,160,' + (nAlpha * 0.2) + ')');
    nodeGlow.addColorStop(1, 'transparent');
    atlasCtx.fillStyle = nodeGlow;
    atlasCtx.fillRect(nx - node.size * 4, ny - node.size * 4, node.size * 8, node.size * 8);

    // Node dot
    atlasCtx.beginPath();
    atlasCtx.arc(nx, ny, node.size * nPulse + 0.5, 0, Math.PI * 2);
    atlasCtx.fillStyle = isDark
      ? 'rgba(140,220,255,' + nAlpha + ')'
      : 'rgba(26,111,160,' + (nAlpha * 0.8) + ')';
    atlasCtx.fill();
  }

  // ── Scanning beam ──
  var scanX1 = cx + Math.cos(atlasScanAngle) * radius;
  var scanY1 = cy + Math.sin(atlasScanAngle) * radius;
  var scanGrad = atlasCtx.createLinearGradient(cx, cy, scanX1, scanY1);
  scanGrad.addColorStop(0, 'transparent');
  scanGrad.addColorStop(0.5, isDark ? 'rgba(91,192,235,0.05)' : 'rgba(26,111,160,0.03)');
  scanGrad.addColorStop(1, isDark ? 'rgba(91,192,235,0.15)' : 'rgba(26,111,160,0.1)');
  atlasCtx.beginPath();
  atlasCtx.moveTo(cx, cy);
  atlasCtx.arc(cx, cy, radius, atlasScanAngle - 0.15, atlasScanAngle + 0.15);
  atlasCtx.closePath();
  atlasCtx.fillStyle = scanGrad;
  atlasCtx.fill();

  // Scan tip glow
  atlasCtx.beginPath();
  atlasCtx.arc(scanX1, scanY1, 3, 0, Math.PI * 2);
  atlasCtx.fillStyle = isDark ? 'rgba(140,220,255,0.6)' : 'rgba(26,111,160,0.4)';
  atlasCtx.shadowColor = isDark ? 'rgba(91,192,235,0.8)' : 'rgba(26,111,160,0.5)';
  atlasCtx.shadowBlur = 10;
  atlasCtx.fill();
  atlasCtx.shadowBlur = 0;

  // ── Floating numbers (subtle, slower) ──
  atlasCtx.textAlign = 'left';
  for (var i = 0; i < atlasNumbers.length; i++) {
    var n = atlasNumbers[i];
    n.x += n.speed * n.dir;
    n.y += n.yDrift;
    if (n.x < -20) n.x = w + 20;
    if (n.x > w + 20) n.x = -20;
    if (n.y < -20) n.y = h + 20;
    if (n.y > h + 20) n.y = -20;

    atlasCtx.font = n.size + 'px "Fira Code", monospace';
    atlasCtx.fillStyle = isDark
      ? 'rgba(91,192,235,' + n.opacity + ')'
      : 'rgba(26,111,160,' + (n.opacity * 0.7) + ')';
    atlasCtx.fillText(n.char, n.x, n.y);

    if (Math.random() < 0.004) {
      n.char = String.fromCharCode(48 + Math.floor(Math.random() * 10));
    }
  }

  // ── Coordinate overlay text (subtle) ──
  if (Math.random() < 0.008) {
    var coordX = Math.random() * w;
    var coordY = Math.random() * h;
    var coordLat = ((Math.random() * 180) - 90).toFixed(2);
    var coordLng = ((Math.random() * 360) - 180).toFixed(2);
    atlasCtx.font = '9px "Fira Code", monospace';
    atlasCtx.fillStyle = isDark ? 'rgba(91,192,235,0.2)' : 'rgba(26,111,160,0.12)';
    atlasCtx.fillText(coordLat + '\u00B0, ' + coordLng + '\u00B0', coordX, coordY);
  }

  atlasAnimId = requestAnimationFrame(drawAtlas);
}

function drawContinentBlob(ctx, cx, cy, r, angle, isDark) {
  var continents = [
    { latOff: -0.1, lngOff: 0, sizeW: 0.35, sizeH: 0.25 },
    { latOff: 0.3, lngOff: 1.5, sizeW: 0.2, sizeH: 0.3 },
    { latOff: -0.3, lngOff: 2.8, sizeW: 0.25, sizeH: 0.2 },
    { latOff: 0.1, lngOff: 4.0, sizeW: 0.3, sizeH: 0.15 },
    { latOff: -0.15, lngOff: 5.2, sizeW: 0.18, sizeH: 0.22 }
  ];

  for (var c = 0; c < continents.length; c++) {
    var cont = continents[c];
    var lngAngle = cont.lngOff + angle;
    var xProj = Math.cos(lngAngle);
    if (xProj < -0.2) continue;

    var fadeAlpha = Math.max(0, Math.min(1, (xProj + 0.2) / 0.6));
    var bx = cx + xProj * r * 0.7;
    var by = cy + cont.latOff * r;
    var bw = cont.sizeW * r * Math.max(0.1, xProj);
    var bh = cont.sizeH * r;

    // Outer glow
    var cGlow = ctx.createRadialGradient(bx, by, 0, bx, by, Math.max(bw, bh) * 1.3);
    cGlow.addColorStop(0, isDark ? 'rgba(91,192,235,' + (0.06 * fadeAlpha) + ')' : 'rgba(26,111,160,' + (0.04 * fadeAlpha) + ')');
    cGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = cGlow;
    ctx.fillRect(bx - bw * 1.5, by - bh * 1.5, bw * 3, bh * 3);

    // Continent fill
    ctx.beginPath();
    ctx.ellipse(bx, by, bw, bh, 0, 0, Math.PI * 2);
    ctx.fillStyle = isDark
      ? 'rgba(91,192,235,' + (0.1 * fadeAlpha) + ')'
      : 'rgba(26,111,160,' + (0.07 * fadeAlpha) + ')';
    ctx.fill();

    // Continent edge highlight
    ctx.beginPath();
    ctx.ellipse(bx, by, bw, bh, 0, 0, Math.PI * 2);
    ctx.strokeStyle = isDark
      ? 'rgba(120,210,255,' + (0.12 * fadeAlpha) + ')'
      : 'rgba(26,111,160,' + (0.08 * fadeAlpha) + ')';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function showAtlasWelcome() {
  var existing = document.querySelector('.atlas-welcome');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'atlas-welcome';
  el.textContent = 'ATLAS \u2014 MAPPING THE INFINITE';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 5000);
}

function setAtlas(active) {
  if (active && !atlasActive) {
    atlasActive = true;
    document.body.classList.add('atlas-active');
    atlasCanvas.classList.add('active');
    atlasCtx.clearRect(0, 0, atlasCanvas.width, atlasCanvas.height);
    var isDark = document.documentElement.classList.contains('dark');
    atlasCtx.fillStyle = isDark ? 'rgba(6,14,28,1)' : 'rgba(218,236,248,1)';
    atlasCtx.fillRect(0, 0, atlasCanvas.width, atlasCanvas.height);
    initAtlasNumbers();
    initAtlasStars();
    initAtlasDataNodes();
    initAtlasOrbitalParticles();
    drawAtlas();
    showAtlasWelcome();
    if (!unlockedBgs.atlas) {
      unlockedBgs.atlas = true;
      gameData.unlockedBgs.atlas = true;
      // Also unlock all lower tiers
      if (!unlockedBgs.criticalerror) {
        unlockedBgs.criticalerror = true;
        gameData.unlockedBgs.criticalerror = true;
      }
      if (!unlockedBgs.cyberspace) {
        unlockedBgs.cyberspace = true;
        gameData.unlockedBgs.cyberspace = true;
      }
      if (!unlockedBgs.dreamspace) {
        unlockedBgs.dreamspace = true;
        gameData.unlockedBgs.dreamspace = true;
      }
      renderBgSelector();
    }
  } else if (!active && atlasActive) {
    atlasActive = false;
    document.body.classList.remove('atlas-active');
    atlasCanvas.classList.remove('active');
    if (atlasAnimId) {
      cancelAnimationFrame(atlasAnimId);
      atlasAnimId = null;
    }
  }
}

// ═══ EQUINOX — YIN & YANG ═══
var eqCanvas = document.getElementById('equinoxCanvas');
var eqCtx = eqCanvas.getContext('2d');
var eqActive = false;
var eqAnimId = null;
var eqIntroShown = false;
var eqAngle = 0;
var eqStars = [];
var eqFloatingCircles = [];
var eqSparkles = [];

function resizeEqCanvas() {
  eqCanvas.width = window.innerWidth;
  eqCanvas.height = window.innerHeight;
  if (eqActive) initEqElements();
}
window.addEventListener('resize', resizeEqCanvas);
resizeEqCanvas();

var eqBoundaryParticles = [];
var eqOrbitDots = [];
var eqKoiFish = [];
var eqShootingStars = [];

function initEqElements() {
  var w = eqCanvas.width;
  var h = eqCanvas.height;
  var minDim = Math.min(w, h);
  eqStars = [];
  eqFloatingCircles = [];
  eqSparkles = [];
  eqBoundaryParticles = [];
  eqOrbitDots = [];

  var starCount = Math.floor((w * h) / 2500);
  for (var i = 0; i < starCount; i++) {
    eqStars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 0.3 + Math.random() * 1.8,
      twinkleSpeed: 0.01 + Math.random() * 0.03,
      twinklePhase: Math.random() * Math.PI * 2,
      isWhite: Math.random() > 0.5
    });
  }
  var circCount = Math.floor(Math.max(w, h) / 70);
  for (var j = 0; j < circCount; j++) {
    var isW = Math.random() > 0.5;
    eqFloatingCircles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 4 + Math.random() * 20,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -0.2 - Math.random() * 0.6,
      alpha: 0.1 + Math.random() * 0.35,
      isWhite: isW
    });
  }
  var sparkCount = Math.floor(Math.max(w, h) / 50);
  for (var k = 0; k < sparkCount; k++) {
    eqSparkles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      phase: Math.random() * Math.PI * 2,
      speed: 0.015 + Math.random() * 0.03,
      size: 1 + Math.random() * 3,
      isWhite: Math.random() > 0.5
    });
  }

  // Boundary energy particles (flow along the dividing line)
  var bpCount = Math.floor(Math.max(w, h) / 30);
  for (var b = 0; b < bpCount; b++) {
    eqBoundaryParticles.push({
      offset: Math.random() * Math.PI * 2,
      dist: (Math.random() - 0.5) * 40,
      speed: 0.3 + Math.random() * 0.8,
      size: 1 + Math.random() * 3,
      alpha: 0.3 + Math.random() * 0.5,
      phase: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.04
    });
  }

  // Orbiting dots along the rings around yin-yang
  var yyRadius = minDim * 0.12;
  for (var ring = 1; ring <= 3; ring++) {
    var rr = yyRadius + ring * minDim * 0.06;
    var dotCount = 4 + ring * 2;
    for (var d = 0; d < dotCount; d++) {
      eqOrbitDots.push({
        ringRadius: rr,
        angle: (d / dotCount) * Math.PI * 2,
        speed: (0.01 + ring * 0.005) * (ring % 2 === 0 ? -1 : 1),
        size: 1.5 + Math.random() * 2.5,
        alpha: 0.4 + Math.random() * 0.4,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.02 + Math.random() * 0.03
      });
    }
  }

  // Koi fish — one white, one black, swimming in harmony
  eqKoiFish = [];
  var koiOrbitR = minDim * 0.28;
  for (var kf = 0; kf < 2; kf++) {
    eqKoiFish.push({
      angle: kf * Math.PI,
      orbitRadius: koiOrbitR,
      speed: 0.006,
      size: minDim * 0.045,
      isWhite: kf === 0,
      tailPhase: Math.random() * Math.PI * 2,
      wobble: Math.random() * Math.PI * 2
    });
  }

  // Shooting stars
  eqShootingStars = [];
  for (var ss = 0; ss < 4; ss++) {
    eqShootingStars.push({
      x: Math.random() * w,
      y: Math.random() * h * 0.5,
      angle: Math.PI * 0.15 + Math.random() * 0.3,
      speed: 3 + Math.random() * 4,
      life: 0,
      maxLife: 40 + Math.random() * 60,
      delay: Math.random() * 500,
      size: 1 + Math.random() * 2,
      active: false
    });
  }
}

// Draw a single koi fish at position, facing direction
function drawKoiFish(ctx, x, y, size, angle, isWhite, tailWag, now) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  var bodyColor = isWhite ? '#f0eef5' : '#0a0912';
  var accentColor = isWhite ? 'rgba(255,200,120,0.7)' : 'rgba(100,160,255,0.6)';
  var eyeColor = isWhite ? '#0a0912' : '#f0eef5';
  var finColor = isWhite ? 'rgba(240,230,245,0.5)' : 'rgba(20,15,30,0.5)';

  // Swimming trail glow
  var trailGrad = ctx.createRadialGradient(size * 0.3, 0, 0, size * 0.3, 0, size * 2.5);
  if (isWhite) {
    trailGrad.addColorStop(0, 'rgba(240,238,245,0.08)');
    trailGrad.addColorStop(1, 'rgba(240,238,245,0)');
  } else {
    trailGrad.addColorStop(0, 'rgba(10,9,18,0.08)');
    trailGrad.addColorStop(1, 'rgba(10,9,18,0)');
  }
  ctx.beginPath();
  ctx.arc(size * 0.3, 0, size * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = trailGrad;
  ctx.fill();

  // Body (teardrop/ellipse shape)
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.9, size * 0.38, 0, 0, Math.PI * 2);
  ctx.fillStyle = bodyColor;
  ctx.fill();

  // Accent patch (koi marking)
  ctx.beginPath();
  ctx.ellipse(size * 0.15, size * 0.08, size * 0.3, size * 0.18, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = accentColor;
  ctx.fill();

  // Second smaller accent
  ctx.beginPath();
  ctx.ellipse(-size * 0.2, -size * 0.05, size * 0.15, size * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = accentColor;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(size * 0.1, -size * 0.35);
  ctx.quadraticCurveTo(size * 0.0, -size * 0.55, -size * 0.2, -size * 0.35);
  ctx.quadraticCurveTo(-size * 0.05, -size * 0.3, size * 0.1, -size * 0.35);
  ctx.fillStyle = finColor;
  ctx.fill();

  // Pectoral fins (two small side fins)
  ctx.save();
  ctx.translate(size * 0.3, size * 0.25);
  ctx.rotate(0.4 + Math.sin(now * 3) * 0.15);
  ctx.beginPath();
  ctx.ellipse(0, size * 0.12, size * 0.12, size * 0.2, 0, 0, Math.PI * 2);
  ctx.fillStyle = finColor;
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(size * 0.3, -size * 0.25);
  ctx.rotate(-0.4 - Math.sin(now * 3) * 0.15);
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.12, size * 0.12, size * 0.2, 0, 0, Math.PI * 2);
  ctx.fillStyle = finColor;
  ctx.fill();
  ctx.restore();

  // Tail (animated wag)
  var tailSwing = Math.sin(tailWag) * 0.45;
  ctx.save();
  ctx.translate(-size * 0.85, 0);
  ctx.rotate(tailSwing);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-size * 0.25, -size * 0.35, -size * 0.5, -size * 0.4);
  ctx.quadraticCurveTo(-size * 0.35, 0, -size * 0.5, size * 0.4);
  ctx.quadraticCurveTo(-size * 0.25, size * 0.35, 0, 0);
  ctx.fillStyle = bodyColor;
  ctx.fill();

  // Tail accent streaks
  ctx.beginPath();
  ctx.moveTo(-size * 0.1, -size * 0.05);
  ctx.quadraticCurveTo(-size * 0.3, -size * 0.2, -size * 0.45, -size * 0.3);
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();

  // Eye
  ctx.beginPath();
  ctx.arc(size * 0.55, -size * 0.08, size * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = eyeColor;
  ctx.fill();

  // Eye highlight
  ctx.beginPath();
  ctx.arc(size * 0.57, -size * 0.1, size * 0.025, 0, Math.PI * 2);
  ctx.fillStyle = isWhite ? 'rgba(255,255,255,0.8)' : 'rgba(180,200,255,0.6)';
  ctx.fill();

  // Subtle body shimmer
  var shimmer = ctx.createLinearGradient(-size, 0, size, 0);
  shimmer.addColorStop(0, 'rgba(255,255,255,0)');
  shimmer.addColorStop(0.3 + 0.2 * Math.sin(now * 2), 'rgba(255,255,255,' + (isWhite ? '0.1' : '0.03') + ')');
  shimmer.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.85, size * 0.35, 0, 0, Math.PI * 2);
  ctx.fillStyle = shimmer;
  ctx.fill();

  ctx.restore();
}

function drawYinYang(ctx, cx, cy, radius, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // Drop shadow glow
  ctx.shadowColor = 'rgba(120,100,180,0.35)';
  ctx.shadowBlur = radius * 0.6;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Main circle - white half
  ctx.beginPath();
  ctx.arc(0, 0, radius, -Math.PI / 2, Math.PI / 2, false);
  ctx.fillStyle = '#f0eef5';
  ctx.fill();

  // Main circle - black half
  ctx.beginPath();
  ctx.arc(0, 0, radius, Math.PI / 2, -Math.PI / 2, false);
  ctx.fillStyle = '#0a0912';
  ctx.fill();

  // Reset shadow
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Upper S-curve bulge (white over black side)
  ctx.beginPath();
  ctx.arc(0, -radius / 2, radius / 2, 0, Math.PI * 2, false);
  ctx.fillStyle = '#f0eef5';
  ctx.fill();

  // Lower S-curve bulge (black over white side)
  ctx.beginPath();
  ctx.arc(0, radius / 2, radius / 2, 0, Math.PI * 2, false);
  ctx.fillStyle = '#0a0912';
  ctx.fill();

  // Small black dot with glow
  var dotGlow1 = ctx.createRadialGradient(0, -radius / 2, 0, 0, -radius / 2, radius * 0.22);
  dotGlow1.addColorStop(0, '#0a0912');
  dotGlow1.addColorStop(0.5, 'rgba(10,9,18,0.7)');
  dotGlow1.addColorStop(1, 'rgba(10,9,18,0)');
  ctx.beginPath();
  ctx.arc(0, -radius / 2, radius * 0.22, 0, Math.PI * 2, false);
  ctx.fillStyle = dotGlow1;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -radius / 2, radius * 0.1, 0, Math.PI * 2, false);
  ctx.fillStyle = '#0a0912';
  ctx.fill();

  // Small white dot with glow
  var dotGlow2 = ctx.createRadialGradient(0, radius / 2, 0, 0, radius / 2, radius * 0.22);
  dotGlow2.addColorStop(0, '#f0eef5');
  dotGlow2.addColorStop(0.5, 'rgba(240,238,245,0.7)');
  dotGlow2.addColorStop(1, 'rgba(240,238,245,0)');
  ctx.beginPath();
  ctx.arc(0, radius / 2, radius * 0.22, 0, Math.PI * 2, false);
  ctx.fillStyle = dotGlow2;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, radius / 2, radius * 0.1, 0, Math.PI * 2, false);
  ctx.fillStyle = '#f0eef5';
  ctx.fill();

  // Outer ring with subtle gradient
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2, false);
  ctx.strokeStyle = 'rgba(160,140,200,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Second outer ring
  ctx.beginPath();
  ctx.arc(0, 0, radius + 3, 0, Math.PI * 2, false);
  ctx.strokeStyle = 'rgba(140,120,180,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawEquinox() {
  if (!eqActive) return;
  var w = eqCanvas.width;
  var h = eqCanvas.height;
  var now = performance.now() / 1000;
  var cx = w / 2;
  var cy = h / 2;
  var minDim = Math.min(w, h);

  // ═══ DYNAMIC S-CURVE BOUNDARY ═══
  var bgRotation = eqAngle * 0.15;
  var diag = Math.sqrt(w * w + h * h);

  // Multi-harmonic noise for organic flowing boundary
  var eqCX = function(yNorm, t) {
    return (minDim * 0.07 + Math.sin(t * 0.3) * minDim * 0.02) * Math.sin(yNorm * 2.5 + t * 0.4)
         + (minDim * 0.04 + Math.sin(t * 0.5) * minDim * 0.012) * Math.sin(yNorm * 5.3 - t * 0.25)
         + (minDim * 0.02) * Math.sin(yNorm * 10.1 + t * 0.55)
         + (minDim * 0.008) * Math.sin(yNorm * 18.7 - t * 0.35);
  };

  eqCtx.save();
  eqCtx.translate(cx, cy);
  eqCtx.rotate(bgRotation);

  // Build reusable curve points
  var curvePoints = [];
  for (var cpi = -diag; cpi <= diag; cpi += 3) {
    curvePoints.push({ x: eqCX(cpi / diag, now), y: cpi });
  }

  // Light side — warm ivory/cream/amber palette
  eqCtx.beginPath();
  eqCtx.moveTo(-diag, -diag);
  for (var si = 0; si < curvePoints.length; si++) {
    eqCtx.lineTo(curvePoints[si].x, curvePoints[si].y);
  }
  eqCtx.lineTo(-diag, diag);
  eqCtx.closePath();
  var whiteGrad = eqCtx.createLinearGradient(-diag, -diag * 0.4, diag * 0.1, diag * 0.4);
  whiteGrad.addColorStop(0, '#faf8f0');
  whiteGrad.addColorStop(0.25, '#f5f0e6');
  whiteGrad.addColorStop(0.5, '#f0eadd');
  whiteGrad.addColorStop(0.75, '#ece4d5');
  whiteGrad.addColorStop(1, '#e6dccb');
  eqCtx.fillStyle = whiteGrad;
  eqCtx.fill();

  // Dark side — deep midnight indigo/obsidian
  eqCtx.beginPath();
  eqCtx.moveTo(diag, -diag);
  for (var si2 = 0; si2 < curvePoints.length; si2++) {
    eqCtx.lineTo(curvePoints[si2].x, curvePoints[si2].y);
  }
  eqCtx.lineTo(diag, diag);
  eqCtx.closePath();
  var blackGrad = eqCtx.createLinearGradient(-diag * 0.1, -diag * 0.4, diag, diag * 0.4);
  blackGrad.addColorStop(0, '#0e0a1e');
  blackGrad.addColorStop(0.25, '#0b0818');
  blackGrad.addColorStop(0.5, '#090614');
  blackGrad.addColorStop(0.75, '#060410');
  blackGrad.addColorStop(1, '#03020a');
  eqCtx.fillStyle = blackGrad;
  eqCtx.fill();

  // Atmospheric texture overlays on each side
  for (var tx = 0; tx < 20; tx++) {
    var txSide = tx < 10 ? -1 : 1;
    var txi = tx % 10;
    var txX = txSide * (minDim * 0.08 + txi * minDim * 0.06) + Math.sin(now * 0.05 + tx * 3.1) * minDim * 0.03;
    var txY = Math.sin(tx * 2.1 + now * 0.04) * diag * 0.45;
    var txR = minDim * 0.12 + Math.sin(now * 0.15 + tx * 1.7) * minDim * 0.04;
    var txA = 0.018 + 0.012 * Math.sin(now * 0.1 + tx * 2.3);
    var txGrad = eqCtx.createRadialGradient(txX, txY, 0, txX, txY, txR);
    if (txSide < 0) {
      txGrad.addColorStop(0, 'rgba(200,170,100,' + txA + ')');
      txGrad.addColorStop(0.5, 'rgba(180,150,90,' + (txA * 0.5) + ')');
      txGrad.addColorStop(1, 'rgba(160,130,80,0)');
    } else {
      txGrad.addColorStop(0, 'rgba(50,70,160,' + txA + ')');
      txGrad.addColorStop(0.5, 'rgba(35,50,130,' + (txA * 0.5) + ')');
      txGrad.addColorStop(1, 'rgba(20,30,100,0)');
    }
    eqCtx.beginPath();
    eqCtx.arc(txX, txY, txR, 0, Math.PI * 2);
    eqCtx.fillStyle = txGrad;
    eqCtx.fill();
  }

  // ═══ INK BLEED / WATERCOLOR EDGE ═══
  for (var ib = 0; ib < 28; ib++) {
    var ibT = ib / 28;
    var ibY = ibT * diag * 2 - diag;
    var ibX = eqCX(ibY / diag, now);
    var ibSpread = minDim * 0.05 + Math.sin(now * 0.4 + ib * 0.75) * minDim * 0.025;
    var ibAlpha = 0.09 + 0.05 * Math.sin(now * 0.25 + ib * 1.1);
    var ibHueShift = (now * 0.1 + ib * 0.2) % (Math.PI * 2);
    var ibR = Math.floor(180 + 60 * Math.sin(ibHueShift));
    var ibG = Math.floor(150 + 60 * Math.sin(ibHueShift + 2.1));
    var ibB = Math.floor(200 + 55 * Math.sin(ibHueShift + 4.2));
    // Light bleeding into dark
    var bleedGrad1 = eqCtx.createRadialGradient(ibX + ibSpread * 0.6, ibY, 0, ibX + ibSpread * 0.6, ibY, ibSpread * 3);
    bleedGrad1.addColorStop(0, 'rgba(245,240,230,' + ibAlpha + ')');
    bleedGrad1.addColorStop(0.3, 'rgba(' + ibR + ',' + ibG + ',' + ibB + ',' + (ibAlpha * 0.35) + ')');
    bleedGrad1.addColorStop(0.7, 'rgba(200,190,180,' + (ibAlpha * 0.12) + ')');
    bleedGrad1.addColorStop(1, 'rgba(180,170,160,0)');
    eqCtx.beginPath();
    eqCtx.arc(ibX + ibSpread * 0.6, ibY, ibSpread * 3, 0, Math.PI * 2);
    eqCtx.fillStyle = bleedGrad1;
    eqCtx.fill();
    // Dark bleeding into light
    var bleedGrad2 = eqCtx.createRadialGradient(ibX - ibSpread * 0.6, ibY, 0, ibX - ibSpread * 0.6, ibY, ibSpread * 3);
    bleedGrad2.addColorStop(0, 'rgba(10,8,25,' + ibAlpha + ')');
    bleedGrad2.addColorStop(0.3, 'rgba(' + Math.floor(ibR * 0.3) + ',' + Math.floor(ibG * 0.3) + ',' + Math.floor(ibB * 0.4) + ',' + (ibAlpha * 0.35) + ')');
    bleedGrad2.addColorStop(0.7, 'rgba(25,20,45,' + (ibAlpha * 0.12) + ')');
    bleedGrad2.addColorStop(1, 'rgba(40,35,60,0)');
    eqCtx.beginPath();
    eqCtx.arc(ibX - ibSpread * 0.6, ibY, ibSpread * 3, 0, Math.PI * 2);
    eqCtx.fillStyle = bleedGrad2;
    eqCtx.fill();
  }

  // ═══ LUMINOUS ENERGY RIVER ALONG BOUNDARY ═══
  eqCtx.save();
  eqCtx.globalCompositeOperation = 'lighter';
  for (var lg = 0; lg < 50; lg++) {
    var lgT = lg / 50;
    var lgY = lgT * diag * 2 - diag;
    var lgX = eqCX(lgY / diag, now);
    var lgPhase = now * 0.8 + lg * 0.15;
    var lgSize = minDim * 0.025 + Math.sin(lgPhase) * minDim * 0.012;
    var lgAlpha = 0.055 + 0.035 * Math.sin(lgPhase * 1.3);
    var lgHue = (now * 0.15 + lgT * 3) % (Math.PI * 2);
    var lgR2 = Math.floor(140 + 80 * Math.sin(lgHue));
    var lgG2 = Math.floor(120 + 80 * Math.sin(lgHue + 2.1));
    var lgB2 = Math.floor(180 + 75 * Math.sin(lgHue + 4.2));
    var lgGrad = eqCtx.createRadialGradient(lgX, lgY, 0, lgX, lgY, lgSize * 4);
    lgGrad.addColorStop(0, 'rgba(' + lgR2 + ',' + lgG2 + ',' + lgB2 + ',' + lgAlpha + ')');
    lgGrad.addColorStop(0.35, 'rgba(' + lgR2 + ',' + lgG2 + ',' + lgB2 + ',' + (lgAlpha * 0.4) + ')');
    lgGrad.addColorStop(1, 'rgba(' + lgR2 + ',' + lgG2 + ',' + lgB2 + ',0)');
    eqCtx.beginPath();
    eqCtx.arc(lgX, lgY, lgSize * 4, 0, Math.PI * 2);
    eqCtx.fillStyle = lgGrad;
    eqCtx.fill();
  }
  // Bright core energy line
  eqCtx.beginPath();
  eqCtx.moveTo(curvePoints[0].x, curvePoints[0].y);
  for (var cli = 1; cli < curvePoints.length; cli++) {
    eqCtx.lineTo(curvePoints[cli].x, curvePoints[cli].y);
  }
  var coreAlpha = 0.15 + 0.08 * Math.sin(now * 1.2);
  eqCtx.strokeStyle = 'rgba(220,200,255,' + coreAlpha + ')';
  eqCtx.lineWidth = 2.5 + Math.sin(now * 2) * 1;
  eqCtx.shadowColor = 'rgba(180,140,255,0.35)';
  eqCtx.shadowBlur = 25;
  eqCtx.stroke();
  eqCtx.shadowColor = 'transparent';
  eqCtx.shadowBlur = 0;
  eqCtx.restore();

  // Nebula atmosphere patches
  for (var neb = 0; neb < 12; neb++) {
    var nebSide = neb < 6 ? -1 : 1;
    var nebIdx = neb % 6;
    var nebX = nebSide * (minDim * 0.12 + nebIdx * minDim * 0.08) + Math.sin(now * 0.08 + neb * 2.3) * minDim * 0.05;
    var nebY = Math.sin(neb * 1.7 + now * 0.06) * diag * 0.4;
    var nebRadius = minDim * 0.12 + Math.sin(now * 0.18 + neb * 1.4) * minDim * 0.04;
    var nebAlpha = 0.02 + 0.015 * Math.sin(now * 0.12 + neb * 1.9);
    var nebGrad = eqCtx.createRadialGradient(nebX, nebY, 0, nebX, nebY, nebRadius);
    if (nebSide < 0) {
      var nebWarmR = 160 + Math.floor(40 * Math.sin(now * 0.1 + neb));
      var nebWarmG = 120 + Math.floor(30 * Math.sin(now * 0.15 + neb * 1.5));
      nebGrad.addColorStop(0, 'rgba(' + nebWarmR + ',' + nebWarmG + ',60,' + nebAlpha + ')');
      nebGrad.addColorStop(0.5, 'rgba(' + (nebWarmR - 20) + ',' + (nebWarmG - 20) + ',50,' + (nebAlpha * 0.4) + ')');
      nebGrad.addColorStop(1, 'rgba(120,80,40,0)');
    } else {
      var nebCoolR = 40 + Math.floor(30 * Math.sin(now * 0.12 + neb));
      var nebCoolB = 160 + Math.floor(40 * Math.sin(now * 0.1 + neb * 1.3));
      nebGrad.addColorStop(0, 'rgba(' + nebCoolR + ',70,' + nebCoolB + ',' + nebAlpha + ')');
      nebGrad.addColorStop(0.5, 'rgba(' + (nebCoolR - 10) + ',50,' + (nebCoolB - 20) + ',' + (nebAlpha * 0.4) + ')');
      nebGrad.addColorStop(1, 'rgba(20,30,100,0)');
    }
    eqCtx.beginPath();
    eqCtx.arc(nebX, nebY, nebRadius, 0, Math.PI * 2);
    eqCtx.fillStyle = nebGrad;
    eqCtx.fill();
  }

  eqCtx.restore();

  // ═══ AURORA CURTAINS ═══
  eqCtx.save();
  eqCtx.translate(cx, cy);
  eqCtx.rotate(bgRotation);
  eqCtx.globalCompositeOperation = 'lighter';
  var auroraPalette = [
    [130, 100, 255], [80, 180, 255], [255, 180, 80], [255, 100, 160],
    [100, 255, 180], [180, 120, 255], [255, 160, 100], [80, 160, 255],
    [200, 80, 220], [100, 240, 160]
  ];
  for (var au = 0; au < 10; au++) {
    var auBaseY = ((au / 10) * 2 - 1) * diag * 0.5;
    var auDrift = Math.sin(now * 0.2 + au * 1.5) * minDim * 0.05;
    var auAlpha = 0.035 + 0.02 * Math.sin(now * 0.5 + au * 0.9);
    var ac = auroraPalette[au];
    // Curtain shape using quadratic curves
    var curtainW = minDim * 0.18 + Math.sin(now * 0.3 + au * 0.7) * minDim * 0.06;
    var curtainH = minDim * 0.1 + Math.sin(now * 0.4 + au) * minDim * 0.04;
    eqCtx.beginPath();
    eqCtx.moveTo(auDrift - curtainW, auBaseY);
    for (var seg = 0; seg < 6; seg++) {
      var segT = (seg + 1) / 6;
      var segX = auDrift - curtainW + segT * curtainW * 2;
      var segY = auBaseY + Math.sin(now * 0.6 + au * 1.2 + seg * 1.8) * curtainH;
      var cpX = auDrift - curtainW + (segT - 1 / 12) * curtainW * 2;
      var cpY = auBaseY + Math.sin(now * 0.7 + au * 1.1 + (seg + 0.5) * 1.8) * curtainH * 1.5;
      eqCtx.quadraticCurveTo(cpX, cpY, segX, segY);
    }
    for (var seg2 = 5; seg2 >= 0; seg2--) {
      var segT2 = seg2 / 6;
      var segX2 = auDrift - curtainW + segT2 * curtainW * 2;
      var segY2 = auBaseY + curtainH * 0.8 + Math.sin(now * 0.5 + au * 0.9 + seg2 * 1.5) * curtainH * 0.5;
      eqCtx.lineTo(segX2, segY2);
    }
    eqCtx.closePath();
    var auGrad = eqCtx.createLinearGradient(auDrift - curtainW, auBaseY - curtainH, auDrift + curtainW, auBaseY + curtainH);
    auGrad.addColorStop(0, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',0)');
    auGrad.addColorStop(0.3, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',' + auAlpha + ')');
    auGrad.addColorStop(0.5, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',' + (auAlpha * 1.5) + ')');
    auGrad.addColorStop(0.7, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',' + auAlpha + ')');
    auGrad.addColorStop(1, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',0)');
    eqCtx.fillStyle = auGrad;
    eqCtx.fill();
    // Glow behind the curtain
    var glowRad = curtainW * 0.8;
    var aGlow = eqCtx.createRadialGradient(auDrift, auBaseY, 0, auDrift, auBaseY, glowRad);
    aGlow.addColorStop(0, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',' + (auAlpha * 0.5) + ')');
    aGlow.addColorStop(0.5, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',' + (auAlpha * 0.15) + ')');
    aGlow.addColorStop(1, 'rgba(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ',0)');
    eqCtx.beginPath();
    eqCtx.arc(auDrift, auBaseY, glowRad, 0, Math.PI * 2);
    eqCtx.fillStyle = aGlow;
    eqCtx.fill();
  }
  eqCtx.globalCompositeOperation = 'source-over';
  eqCtx.restore();

  // Boundary energy particles
  eqCtx.save();
  eqCtx.translate(cx, cy);
  eqCtx.rotate(bgRotation);
  for (var bp = 0; bp < eqBoundaryParticles.length; bp++) {
    var p = eqBoundaryParticles[bp];
    p.offset += p.speed * 0.01;
    p.phase += p.pulseSpeed;
    var py = Math.sin(p.offset) * diag * 0.5;
    var px = p.dist + Math.sin(now * 2 + p.phase) * 8;
    var pAlpha = p.alpha * (0.5 + 0.5 * Math.sin(p.phase));
    var pSide = px > 0;
    eqCtx.beginPath();
    eqCtx.arc(px, py, p.size * (0.7 + 0.3 * Math.sin(p.phase)), 0, Math.PI * 2);
    eqCtx.fillStyle = pSide ? 'rgba(255,255,255,' + pAlpha + ')' : 'rgba(60,55,70,' + pAlpha + ')';
    eqCtx.fill();
  }
  eqCtx.restore();

  // Stars
  for (var i = 0; i < eqStars.length; i++) {
    var s = eqStars[i];
    var twinkle = 0.3 + 0.7 * Math.abs(Math.sin(now * s.twinkleSpeed * 10 + s.twinklePhase));
    eqCtx.beginPath();
    eqCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    if (s.isWhite) {
      eqCtx.fillStyle = 'rgba(255,255,255,' + (twinkle * 0.6) + ')';
    } else {
      eqCtx.fillStyle = 'rgba(0,0,0,' + (twinkle * 0.6) + ')';
    }
    eqCtx.fill();
  }

  // Floating circles
  for (var j = 0; j < eqFloatingCircles.length; j++) {
    var c = eqFloatingCircles[j];
    c.x += c.vx;
    c.y += c.vy;
    if (c.y < -c.r * 2) { c.y = h + c.r; c.x = Math.random() * w; }
    if (c.x < -c.r * 2) c.x = w + c.r;
    if (c.x > w + c.r * 2) c.x = -c.r;

    // Soft glow around floating circles
    var cGlow = eqCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r * 2.5);
    if (c.isWhite) {
      cGlow.addColorStop(0, 'rgba(255,255,255,' + (c.alpha * 0.3) + ')');
      cGlow.addColorStop(1, 'rgba(255,255,255,0)');
    } else {
      cGlow.addColorStop(0, 'rgba(0,0,0,' + (c.alpha * 0.3) + ')');
      cGlow.addColorStop(1, 'rgba(0,0,0,0)');
    }
    eqCtx.beginPath();
    eqCtx.arc(c.x, c.y, c.r * 2.5, 0, Math.PI * 2);
    eqCtx.fillStyle = cGlow;
    eqCtx.fill();

    eqCtx.beginPath();
    eqCtx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    eqCtx.fillStyle = c.isWhite ? 'rgba(255,255,255,' + c.alpha + ')' : 'rgba(0,0,0,' + c.alpha + ')';
    eqCtx.fill();
  }

  // Sparkle effects
  for (var k = 0; k < eqSparkles.length; k++) {
    var sp = eqSparkles[k];
    var sparkAlpha = 0.2 + 0.6 * Math.abs(Math.sin(now * sp.speed * 10 + sp.phase));
    var sparkSize = sp.size * (0.7 + 0.3 * Math.sin(now * sp.speed * 8 + sp.phase));

    eqCtx.save();
    eqCtx.translate(sp.x, sp.y);
    eqCtx.rotate(now * 0.5 + sp.phase);
    var col = sp.isWhite ? '255,255,255' : '0,0,0';
    eqCtx.strokeStyle = 'rgba(' + col + ',' + sparkAlpha + ')';
    eqCtx.lineWidth = 0.8;
    eqCtx.beginPath();
    eqCtx.moveTo(-sparkSize, 0); eqCtx.lineTo(sparkSize, 0);
    eqCtx.moveTo(0, -sparkSize); eqCtx.lineTo(0, sparkSize);
    eqCtx.stroke();
    eqCtx.restore();
  }

  // ═══ CENTRAL YIN-YANG WITH MULTI-LAYER GLOW ═══
  var yyRadius = minDim * 0.12;
  eqAngle += 0.012;
  var pulseFactor = 1 + 0.04 * Math.sin(now * 1.5);

  // Outer cosmic glow (large, soft)
  var outerGlow = eqCtx.createRadialGradient(cx, cy, yyRadius * 0.5, cx, cy, yyRadius * 5);
  outerGlow.addColorStop(0, 'rgba(160,140,210,0.045)');
  outerGlow.addColorStop(0.3, 'rgba(140,120,190,0.025)');
  outerGlow.addColorStop(0.6, 'rgba(120,100,170,0.01)');
  outerGlow.addColorStop(1, 'rgba(100,80,150,0)');
  eqCtx.beginPath();
  eqCtx.arc(cx, cy, yyRadius * 5, 0, Math.PI * 2);
  eqCtx.fillStyle = outerGlow;
  eqCtx.fill();

  // Pulsing inner aura
  var innerGlow = eqCtx.createRadialGradient(cx, cy, yyRadius * 0.6, cx, cy, yyRadius * 2.5 * pulseFactor);
  innerGlow.addColorStop(0, 'rgba(180,160,230,0.1)');
  innerGlow.addColorStop(0.4, 'rgba(150,130,200,0.06)');
  innerGlow.addColorStop(0.7, 'rgba(120,100,170,0.025)');
  innerGlow.addColorStop(1, 'rgba(100,80,150,0)');
  eqCtx.beginPath();
  eqCtx.arc(cx, cy, yyRadius * 2.5 * pulseFactor, 0, Math.PI * 2);
  eqCtx.fillStyle = innerGlow;
  eqCtx.fill();

  // Color accent ring
  var accentAlpha = 0.045 + 0.025 * Math.sin(now * 2);
  var accentGlow = eqCtx.createRadialGradient(cx, cy, yyRadius * 1.2, cx, cy, yyRadius * 1.9);
  accentGlow.addColorStop(0, 'rgba(200,170,255,' + accentAlpha + ')');
  accentGlow.addColorStop(0.5, 'rgba(170,200,255,' + (accentAlpha * 0.6) + ')');
  accentGlow.addColorStop(1, 'rgba(140,160,210,0)');
  eqCtx.beginPath();
  eqCtx.arc(cx, cy, yyRadius * 1.9, 0, Math.PI * 2);
  eqCtx.fillStyle = accentGlow;
  eqCtx.fill();

  drawYinYang(eqCtx, cx, cy, yyRadius, eqAngle);

  // Orbiting rings with orbiting dots
  for (var ring = 1; ring <= 3; ring++) {
    var rr = yyRadius + ring * minDim * 0.06;
    var ringAlpha = 0.15 - ring * 0.025;
    // Dashed ring effect
    eqCtx.beginPath();
    eqCtx.arc(cx, cy, rr, 0, Math.PI * 2);
    eqCtx.strokeStyle = 'rgba(140,138,155,' + ringAlpha + ')';
    eqCtx.lineWidth = 0.8;
    eqCtx.setLineDash([4, 8]);
    eqCtx.stroke();
    eqCtx.setLineDash([]);
  }

  // Orbiting dots along the rings
  for (var od = 0; od < eqOrbitDots.length; od++) {
    var dot = eqOrbitDots[od];
    dot.angle += dot.speed;
    dot.pulse += dot.pulseSpeed;
    var dotX = cx + Math.cos(dot.angle) * dot.ringRadius;
    var dotY = cy + Math.sin(dot.angle) * dot.ringRadius;
    var dotAlpha = dot.alpha * (0.5 + 0.5 * Math.sin(dot.pulse));
    var dotSize = dot.size * (0.8 + 0.2 * Math.sin(dot.pulse * 1.5));

    // Determine which side of the boundary this dot is on for color
    var dotAngleRel = dot.angle + eqAngle;
    var dotSide = Math.cos(dotAngleRel - bgRotation);
    var dotIsWhite = dotSide < 0;

    // Trail glow
    var tGlow = eqCtx.createRadialGradient(dotX, dotY, 0, dotX, dotY, dotSize * 4);
    if (dotIsWhite) {
      tGlow.addColorStop(0, 'rgba(255,255,255,' + (dotAlpha * 0.5) + ')');
      tGlow.addColorStop(1, 'rgba(255,255,255,0)');
    } else {
      tGlow.addColorStop(0, 'rgba(60,55,70,' + (dotAlpha * 0.5) + ')');
      tGlow.addColorStop(1, 'rgba(0,0,0,0)');
    }
    eqCtx.beginPath();
    eqCtx.arc(dotX, dotY, dotSize * 4, 0, Math.PI * 2);
    eqCtx.fillStyle = tGlow;
    eqCtx.fill();

    eqCtx.beginPath();
    eqCtx.arc(dotX, dotY, dotSize, 0, Math.PI * 2);
    eqCtx.fillStyle = dotIsWhite ? 'rgba(255,255,255,' + dotAlpha + ')' : 'rgba(40,35,50,' + dotAlpha + ')';
    eqCtx.fill();
  }

  // ═══ KOI FISH SWIMMING IN HARMONY ═══
  for (var kf = 0; kf < eqKoiFish.length; kf++) {
    var koi = eqKoiFish[kf];
    koi.angle += koi.speed;
    koi.tailPhase += 0.08;
    koi.wobble += 0.02;
    // Figure-8 orbit path for more organic movement
    var koiOrbitX = Math.cos(koi.angle) * koi.orbitRadius;
    var koiOrbitY = Math.sin(koi.angle * 2) * koi.orbitRadius * 0.4;
    var koiX = cx + koiOrbitX + Math.sin(koi.wobble * 1.3) * 8;
    var koiY = cy + koiOrbitY + Math.cos(koi.wobble * 0.9) * 6;
    // Calculate facing direction from movement
    var nextAngle = koi.angle + koi.speed;
    var nextX = cx + Math.cos(nextAngle) * koi.orbitRadius;
    var nextY = cy + Math.sin(nextAngle * 2) * koi.orbitRadius * 0.4;
    var koiFacing = Math.atan2(nextY - koiY, nextX - koiX);

    // Water ripple rings behind the koi
    for (var rip = 0; rip < 3; rip++) {
      var ripPhase = (now * 1.5 + kf * 3 + rip * 0.8) % 3;
      var ripR = ripPhase * koi.size * 0.6;
      var ripA = Math.max(0, 0.08 * (1 - ripPhase / 3));
      if (ripA > 0.002) {
        eqCtx.beginPath();
        eqCtx.arc(koiX - Math.cos(koiFacing) * koi.size * 0.3 * rip, koiY - Math.sin(koiFacing) * koi.size * 0.3 * rip, ripR, 0, Math.PI * 2);
        eqCtx.strokeStyle = koi.isWhite ? 'rgba(240,238,245,' + ripA + ')' : 'rgba(30,25,50,' + ripA + ')';
        eqCtx.lineWidth = 1;
        eqCtx.stroke();
      }
    }

    drawKoiFish(eqCtx, koiX, koiY, koi.size, koiFacing, koi.isWhite, koi.tailPhase, now);
  }

  // ═══ SHOOTING STARS ═══
  for (var ss = 0; ss < eqShootingStars.length; ss++) {
    var star = eqShootingStars[ss];
    star.delay--;
    if (star.delay <= 0 && !star.active) {
      star.active = true;
      star.life = 0;
      star.x = Math.random() * w;
      star.y = Math.random() * h * 0.4;
    }
    if (star.active) {
      star.life++;
      star.x += Math.cos(star.angle) * star.speed;
      star.y += Math.sin(star.angle) * star.speed;
      var ssProgress = star.life / star.maxLife;
      var ssAlpha = ssProgress < 0.2 ? ssProgress * 5 : (1 - ssProgress) * 1.25;
      ssAlpha = Math.max(0, Math.min(1, ssAlpha));
      var ssTailLen = star.speed * 12;
      var ssTailX = star.x - Math.cos(star.angle) * ssTailLen;
      var ssTailY = star.y - Math.sin(star.angle) * ssTailLen;
      // Determine color based on background side
      var ssOnWhite = star.x < w / 2;
      var ssGrad = eqCtx.createLinearGradient(star.x, star.y, ssTailX, ssTailY);
      if (ssOnWhite) {
        ssGrad.addColorStop(0, 'rgba(40,30,80,' + (ssAlpha * 0.7) + ')');
        ssGrad.addColorStop(1, 'rgba(40,30,80,0)');
      } else {
        ssGrad.addColorStop(0, 'rgba(240,235,255,' + (ssAlpha * 0.7) + ')');
        ssGrad.addColorStop(1, 'rgba(240,235,255,0)');
      }
      eqCtx.beginPath();
      eqCtx.moveTo(star.x, star.y);
      eqCtx.lineTo(ssTailX, ssTailY);
      eqCtx.strokeStyle = ssGrad;
      eqCtx.lineWidth = star.size;
      eqCtx.stroke();
      // Head glow
      eqCtx.beginPath();
      eqCtx.arc(star.x, star.y, star.size * 2, 0, Math.PI * 2);
      eqCtx.fillStyle = ssOnWhite ? 'rgba(80,60,140,' + (ssAlpha * 0.4) + ')' : 'rgba(220,210,255,' + (ssAlpha * 0.4) + ')';
      eqCtx.fill();
      if (star.life >= star.maxLife) {
        star.active = false;
        star.delay = 100 + Math.random() * 400;
        star.x = Math.random() * w;
        star.y = Math.random() * h * 0.4;
        star.angle = Math.PI * 0.15 + Math.random() * 0.3;
        star.speed = 3 + Math.random() * 4;
        star.maxLife = 40 + Math.random() * 60;
      }
    }
  }

  // ═══ COSMIC RAYS FROM CENTER ═══
  eqCtx.save();
  eqCtx.translate(cx, cy);
  for (var ray = 0; ray < 12; ray++) {
    var rayAngle = (ray / 12) * Math.PI * 2 + now * 0.08;
    var rayLen = minDim * 0.3 + Math.sin(now * 0.5 + ray * 1.1) * minDim * 0.15;
    var rayW = minDim * 0.008 * (1 + Math.sin(now * 0.8 + ray * 0.7) * 0.5);
    var rayAlpha = 0.018 + 0.012 * Math.sin(now * 0.6 + ray * 0.9);
    var rEndX = Math.cos(rayAngle) * rayLen;
    var rEndY = Math.sin(rayAngle) * rayLen;
    var rPerpX = Math.cos(rayAngle + Math.PI / 2) * rayW;
    var rPerpY = Math.sin(rayAngle + Math.PI / 2) * rayW;
    var rGrad = eqCtx.createLinearGradient(0, 0, rEndX, rEndY);
    rGrad.addColorStop(0, 'rgba(180,170,220,' + (rayAlpha * 2) + ')');
    rGrad.addColorStop(0.3, 'rgba(160,150,210,' + rayAlpha + ')');
    rGrad.addColorStop(1, 'rgba(140,130,190,0)');
    eqCtx.beginPath();
    eqCtx.moveTo(rPerpX, rPerpY);
    eqCtx.lineTo(rEndX, rEndY);
    eqCtx.lineTo(-rPerpX, -rPerpY);
    eqCtx.closePath();
    eqCtx.fillStyle = rGrad;
    eqCtx.fill();
  }
  eqCtx.restore();

  // ═══ ENERGY PULSE WAVES ═══
  for (var pw = 0; pw < 5; pw++) {
    var wavePhase = (now * 0.3 + pw * 1.2) % 6;
    var waveR = wavePhase * minDim * 0.15;
    var waveA = Math.max(0, 0.06 * (1 - wavePhase / 6));
    if (waveA > 0.001) {
      eqCtx.beginPath();
      eqCtx.arc(cx, cy, waveR, 0, Math.PI * 2);
      eqCtx.strokeStyle = 'rgba(170,155,220,' + waveA + ')';
      eqCtx.lineWidth = 1.5;
      eqCtx.stroke();
    }
  }

  eqAnimId = requestAnimationFrame(drawEquinox);
}

function showEquinoxWelcome() {
  var existing = document.querySelector('.equinox-welcome');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'equinox-welcome';
  el.textContent = 'EQUINOX — THE BALANCE OF ALL';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 5000);
}

function showEquinoxIntro() {
  if (eqIntroShown) return;
  eqIntroShown = true;

  var overlay = document.createElement('div');
  overlay.className = 'equinox-intro-overlay';

  // Spinning container (circle)
  var spinContainer = document.createElement('div');
  spinContainer.className = 'equinox-intro-spin';

  // Left half (white)
  var leftHalf = document.createElement('div');
  leftHalf.className = 'equinox-intro-half left';
  var leftCircles = document.createElement('div');
  leftCircles.className = 'equinox-intro-circles-container';
  leftHalf.appendChild(leftCircles);

  // Right half (black)
  var rightHalf = document.createElement('div');
  rightHalf.className = 'equinox-intro-half right';
  var rightCircles = document.createElement('div');
  rightCircles.className = 'equinox-intro-circles-container';
  rightHalf.appendChild(rightCircles);

  spinContainer.appendChild(leftHalf);
  spinContainer.appendChild(rightHalf);
  overlay.appendChild(spinContainer);

  // Text on top
  var textEl = document.createElement('div');
  textEl.className = 'equinox-intro-text';
  textEl.textContent = 'The Negative and Positive';
  overlay.appendChild(textEl);

  document.body.appendChild(overlay);

  // Spawn dropping circles continuously
  var circleInterval = setInterval(function() {
    spawnEqIntroCirle(leftCircles);
    spawnEqIntroCirle(rightCircles);
  }, 200);

  // Sync text gradient angle with spinning background so text always contrasts
  var eqTextStart = performance.now();
  var eqTextAnimId = null;
  function updateEqTextGradient(now) {
    var elapsed = now - eqTextStart;
    var angle = 90 + ((elapsed % 12000) / 12000) * 360;
    textEl.style.background = 'linear-gradient(' + angle + 'deg, #000000 50%, #ffffff 50%)';
    textEl.style.backgroundSize = '100vw 100%';
    textEl.style.webkitBackgroundClip = 'text';
    textEl.style.backgroundClip = 'text';
    textEl.style.webkitTextFillColor = 'transparent';
    eqTextAnimId = requestAnimationFrame(updateEqTextGradient);
  }
  eqTextAnimId = requestAnimationFrame(updateEqTextGradient);

  // Reveal text after 0.5s
  setTimeout(function() {
    textEl.classList.add('reveal');
  }, 500);

  // After 5 seconds, fade out
  setTimeout(function() {
    clearInterval(circleInterval);
    if (eqTextAnimId) cancelAnimationFrame(eqTextAnimId);
    overlay.classList.add('fade-out');
    setTimeout(function() {
      overlay.remove();
    }, 1300);
  }, 5000);
}

function spawnEqIntroCirle(container) {
  var circle = document.createElement('div');
  circle.className = 'equinox-drop-circle';
  var size = 10 + Math.random() * 140;
  circle.style.width = size + 'px';
  circle.style.height = size + 'px';
  circle.style.left = Math.random() * 100 + '%';
  circle.style.top = Math.random() * 100 + '%';
  circle.style.animationDuration = (1.5 + Math.random() * 3) + 's';
  container.appendChild(circle);
  setTimeout(function() { circle.remove(); }, 5000);
}

function setEquinox(active) {
  if (active && !eqActive) {
    eqActive = true;
    document.body.classList.add('equinox-active');
    eqCanvas.classList.add('active');
    eqCtx.clearRect(0, 0, eqCanvas.width, eqCanvas.height);
    // Fill half-half
    var w = eqCanvas.width;
    var h = eqCanvas.height;
    eqCtx.fillStyle = '#ffffff';
    eqCtx.fillRect(0, 0, w / 2, h);
    eqCtx.fillStyle = '#000000';
    eqCtx.fillRect(w / 2, 0, w / 2, h);
    initEqElements();
    drawEquinox();
    showEquinoxIntro();
    if (!unlockedBgs.equinox) {
      unlockedBgs.equinox = true;
      gameData.unlockedBgs.equinox = true;
      if (!unlockedBgs.atlas) { unlockedBgs.luminosity = true; gameData.unlockedBgs.luminosity = true; }
